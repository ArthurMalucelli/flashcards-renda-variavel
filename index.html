<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards CPA-10 Cap 6 — Renda Variável</title>
<style>
  :root {
    --bg-0: #0a0e1a;
    --bg-1: #11162a;
    --bg-2: #1a2140;
    --accent: #5fffd1;
    --accent-2: #7c5cff;
    --good: #3ddc84;
    --bad: #ff4d6d;
    --warn: #ffb547;
    --text: #e8ecf5;
    --muted: #8892b0;
    --line: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, var(--bg-2) 0%, var(--bg-0) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 600; letter-spacing: 0.3px; font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .meta-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .pill strong { color: var(--text); font-weight: 600; }
  .pill.level { text-transform: uppercase; letter-spacing: 0.5px; }
  .pill.level.facil { color: var(--good); border-color: rgba(61, 220, 132, 0.3); }
  .pill.level.medio { color: var(--warn); border-color: rgba(255, 181, 71, 0.3); }
  .pill.level.dificil { color: var(--bad); border-color: rgba(255, 77, 109, 0.3); }
  .pill.level.misturado { color: var(--accent-2); border-color: rgba(124, 92, 255, 0.3); }

  .progress {
    height: 4px; width: 100%;
    background: var(--bg-1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width 320ms cubic-bezier(.4,0,.2,1);
  }

  /* Intro */
  .intro {
    text-align: center;
    padding: 50px 28px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  .intro h1 {
    font-size: 30px;
    margin: 0 0 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .intro p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    max-width: 460px;
    margin: 0 auto 32px;
  }
  .level-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-top: 28px;
    text-align: left;
  }
  .level-card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 20px;
    cursor: pointer;
    transition: all 180ms ease;
    color: var(--text);
    font-family: inherit;
    text-align: left;
  }
  .level-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .level-card .lvl-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .level-card .lvl-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .level-card .lvl-count { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 12px; color: var(--muted); }
  .level-card.facil { border-left: 3px solid var(--good); }
  .level-card.medio { border-left: 3px solid var(--warn); }
  .level-card.dificil { border-left: 3px solid var(--bad); }
  .level-card.misturado { border-left: 3px solid var(--accent-2); }

  /* Card flashcard */
  .card-stage {
    perspective: 1500px;
    width: 100%;
    margin: 0 auto;
  }
  .flashcard {
    position: relative;
    width: 100%;
    min-height: 360px;
    transform-style: preserve-3d;
    transition: transform 600ms cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 40px 32px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .face.back {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, var(--bg-2), var(--bg-1));
  }
  .face .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .face.front .question {
    font-size: 22px;
    font-weight: 500;
    line-height: 1.45;
  }
  .face.back .answer {
    font-size: 17px;
    line-height: 1.55;
    text-align: left;
  }
  .face .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 10px;
  }
  .controls .left { display: flex; gap: 8px; }
  .controls .right { display: flex; gap: 8px; }
  button.btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0a0e1a;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: transform 120ms ease;
  }
  button.btn:hover { transform: translateY(-1px); }
  button.btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
  }
  button.btn.good { background: var(--good); color: #0a0e1a; }
  button.btn.bad { background: var(--bad); color: white; }

  .self-rating {
    display: none;
    justify-content: center;
    gap: 10px;
    margin-top: 22px;
  }
  .self-rating.show { display: flex; }
  .rating-label {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 22px;
    margin-bottom: -4px;
  }

  /* Final */
  .final {
    text-align: center;
    padding: 50px 28px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  .final .ring {
    width: 180px; height: 180px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--p) * 1%), var(--bg-2) 0);
    display: grid; place-items: center;
    position: relative;
  }
  .final .ring::before {
    content: ""; position: absolute; inset: 12px;
    background: var(--bg-1); border-radius: 50%;
  }
  .final .ring .pct {
    position: relative; font-size: 38px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .final h2 { margin: 0 0 8px; font-size: 26px; }
  .final p.sub { color: var(--muted); margin-bottom: 28px; }
  .review {
    text-align: left;
    margin-top: 32px;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }
  .review h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
  .review-item {
    background: var(--bg-2);
    border-left: 3px solid var(--bad);
    padding: 14px 16px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  .review-item .q { font-weight: 600; margin-bottom: 6px; }
  .review-item .a { color: var(--muted); font-size: 13px; }

  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 32px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .face.front .question { font-size: 18px; }
    .face.back .answer { font-size: 15px; }
    .face { padding: 32px 22px; }
    .level-grid { grid-template-columns: 1fr; }
    .flashcard { min-height: 320px; }
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="brand"><span class="dot"></span> Flashcards · Renda Variável</div>
  <div class="meta-pills" id="metaPills"></div>
</header>

<div class="progress" id="progressWrap" style="display:none">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div id="screen"></div>

<div class="footer">CPA-10 ANBIMA · Cap 6.1 Ações · Treino pra gameshow</div>

</div>

<script>
const FACIL = [
  { q: "O que é uma ação?", a: "Fração ideal do capital social de uma S.A. Quem detém é sócio da empresa, com exposição ao upside e downside dos resultados." },
  { q: "Renda fixa vs renda variável, em uma frase?", a: "Renda fixa = promessa de pagamento (dívida). Renda variável = participação no capital, sem retorno garantido." },
  { q: "ON significa o quê?", a: "Ação Ordinária Nominativa." },
  { q: "PN significa o quê?", a: "Ação Preferencial Nominativa." },
  { q: "Qual o dígito final de uma ação ON na B3?", a: "3. Exemplos: PETR3, VALE3, ABEV3." },
  { q: "Qual o dígito final de uma ação PN na B3?", a: "4. Exemplos: PETR4, ITUB4, BBDC4." },
  { q: "Qual o lote-padrão de negociação na B3?", a: "100 ações." },
  { q: "Quem dá direito a voto em assembleia, ON ou PN?", a: "ON. PN só vota em casos excepcionais previstos em lei." },
  { q: "Quem tem prioridade no recebimento de dividendos?", a: "Acionistas preferenciais (PN)." },
  { q: "O que é capital próprio da empresa?", a: "Patrimônio líquido: recursos aportados pelos sócios + lucros retidos. Pertence aos acionistas." },
  { q: "O que é capital de terceiros?", a: "Dívidas da empresa: debêntures, empréstimos bancários etc. Pertence aos credores." },
  { q: "O que é IPO?", a: "Initial Public Offering. Primeira venda pública de ações de uma empresa, marcando a abertura de capital." },
  { q: "O que é uma CTVM?", a: "Sociedade Corretora de Títulos e Valores Mobiliários. Intermedia ordens entre investidor e bolsa." },
  { q: "O que é uma DTVM?", a: "Sociedade Distribuidora de Títulos e Valores Mobiliários. Desde 2009 equiparada à corretora." },
  { q: "O que é home broker?", a: "Plataforma eletrônica que permite ao investidor enviar ordens à corretora pela internet, sem operador humano." },
  { q: "O que é um dividendo?", a: "Distribuição de parte do lucro líquido aos acionistas, em proporção ao número de ações." },
  { q: "O que é JCP?", a: "Juros sobre Capital Próprio. Forma de remuneração do acionista a partir de lucros retidos de exercícios anteriores, com vantagem fiscal pra empresa." },
  { q: "O que é bonificação em ações?", a: "Distribuição gratuita de novas ações aos acionistas, originada na capitalização de reservas de lucro. Sem entrada de dinheiro novo." },
  { q: "O que é subscrição?", a: "Oferta de novas ações pra compra. Aumenta o capital social da empresa, com entrada efetiva de recursos." },
  { q: "O que é desdobramento (split)?", a: "Divisão de uma ação em N ações novas, com queda proporcional no preço unitário." },
  { q: "O que é grupamento (inplit)?", a: "Agrupamento de N ações em uma só, com aumento proporcional no preço unitário. Inverso do split." },
  { q: "O que é ganho de capital?", a: "Diferença positiva entre o preço de venda e o preço de compra de um ativo." },
  { q: "O que é day trade?", a: "Operação de compra e venda do mesmo ativo no mesmo dia, no mesmo intermediário." },
  { q: "O que é risco sistemático?", a: "Risco de mercado. Afeta todos os ativos, causado por crises, juros, política. Não pode ser eliminado por diversificação." },
  { q: "O que é risco não sistemático?", a: "Risco específico de uma empresa ou setor. Pode ser eliminado por diversificação." },
  { q: "O que é risco de liquidez?", a: "Risco de não conseguir negociar um ativo a um preço justo, por falta de contraparte ou pouca profundidade do mercado." },
  { q: "Que despesa cobra a corretora pela intermediação?", a: "Corretagem." },
  { q: "Que despesa é cobrada pela B3 por operação?", a: "Emolumentos." },
  { q: "Que despesa remunera a manutenção da posição em conta?", a: "Taxa de custódia." },
  { q: "O que é um clube de investimento?", a: "Comunhão de recursos de pessoas físicas (3 a 50) pra investir em valores mobiliários, com foco obrigatório em renda variável." },
  { q: "O que é mercado primário?", a: "Onde os ativos são vendidos pela primeira vez. Recursos vão pro emissor (a empresa)." },
  { q: "O que é mercado secundário?", a: "Onde os ativos já existentes são negociados entre investidores. Recursos vão pro vendedor, não pra empresa." },
  { q: "Qual a principal bolsa de valores do Brasil?", a: "B3 S.A. (Brasil, Bolsa, Balcão). Empresa de capital aberto que provê a infraestrutura do mercado financeiro brasileiro." },
  { q: "O que é uma S.A.?", a: "Sociedade Anônima. Empresa cujo capital é dividido em ações, podendo ser negociadas (capital aberto) ou não (capital fechado)." },
  { q: "O que é um acionista?", a: "Pessoa física ou jurídica que detém ações de uma empresa. É sócio em proporção à participação." },
  { q: "O que é o Estatuto Social?", a: "Documento que rege a S.A.: define percentual mínimo de dividendo, direitos de cada classe de ação, periodicidade de pagamentos etc." },
  { q: "O que é o Ibovespa?", a: "Principal índice acionário da B3, composto pelas ações mais negociadas e representativas do mercado brasileiro." },
  { q: "O que é provento?", a: "Qualquer remuneração paga pela empresa ao acionista pela posse das ações: dividendos, JCP, bonificações." },
  { q: "O que é ETF?", a: "Exchange Traded Fund. Fundo de índice negociado em bolsa como uma ação, replica a composição de um índice (ex: BOVA11 replica o Ibovespa)." },
  { q: "O que é um cotista?", a: "Pessoa que detém cotas de um fundo ou clube de investimento, em proporção ao valor aportado." }
];

const MEDIO = [
  { q: "Qual segmento da B3 só admite ações ordinárias?", a: "Novo Mercado. Padrão de governança superior desde 2000, exige só ON no capital social." },
  { q: "O que ocorre quando a demanda em um IPO supera a oferta?", a: "Sobredemanda. Gera rateio: cada investidor recebe parcela proporcional ao pedido feito no período de reserva." },
  { q: "Diferença entre ordem limitada e ordem a mercado em IPO?", a: "Limitada: investidor define preço máximo, só compra se preço final for igual ou inferior. A mercado: aceita qualquer preço final, garante a execução." },
  { q: "Em uma oferta primária, quem recebe os recursos?", a: "A empresa. Aumenta o capital social. Em oferta secundária os recursos vão pros acionistas vendedores, não pra empresa." },
  { q: "O que é período de reserva em um IPO?", a: "Janela em que o investidor manifesta interesse à corretora, indicando quantas ações ou que valor em R$ deseja adquirir." },
  { q: "Como são tributados os dividendos pra pessoa física?", a: "Isentos de IR. O lucro já foi tributado na empresa antes." },
  { q: "Como é tributado o JCP pra pessoa física?", a: "15% de IR retido na fonte." },
  { q: "Por que o JCP existe pra empresa?", a: "É dedutível da base de IRPJ e CSLL no lucro real. A empresa paga menos imposto distribuindo JCP do que pagaria distribuindo dividendo." },
  { q: "Bonificação altera o valor de mercado da empresa?", a: "Não. Só reclassifica reservas de lucro pra capital social. Acionista fica com mais ações a preço menor, valor total inalterado." },
  { q: "Subscrição traz dinheiro novo pra empresa?", a: "Sim. É justamente o aumento de capital efetivo, com novos recursos entrando." },
  { q: "Split altera o patrimônio do acionista?", a: "Não. Só muda quantidade de ações (sobe) e preço unitário (cai), proporcionalmente. Valor patrimonial total e participação % permanecem." },
  { q: "Por que uma empresa faz grupamento de ações?", a: "Sair da faixa de penny stock (< R$ 1), reduzir volatilidade, evitar exclusão do Ibovespa." },
  { q: "Risco sistemático pode ser eliminado por diversificação?", a: "Não. Sobra mesmo com carteira amplamente diversificada. É o risco intrínseco de estar em ações." },
  { q: "Risco específico de uma empresa pode ser eliminado por diversificação?", a: "Sim. Carteira com várias ações em setores descorrelacionados converge a zero o risco específico." },
  { q: "Quais os dois indicadores principais de risco de liquidez em ações?", a: "1. Volume diário negociado da ação. 2. Spread bid-ask (diferença entre melhor preço de compra e melhor preço de venda no book)." },
  { q: "Qual a alíquota de IR sobre ganho no mercado à vista de ações?", a: "15% sobre o lucro." },
  { q: "Qual a alíquota de IR sobre lucro em day trade?", a: "20% sobre o lucro." },
  { q: "A isenção de R$ 20.000 vale pra que valor exatamente?", a: "Pras vendas totais no mês. Se vender até R$ 20k, ganho é isento. Não é sobre o lucro." },
  { q: "A isenção de R$ 20.000 vale pra day trade?", a: "Não. Day trade nunca tem isenção, sempre 20% sobre o lucro." },
  { q: "Como funciona a compensação de prejuízos em ações?", a: "Mercado à vista compensa só com à vista. Day trade compensa só com day trade. Nunca cruzam." },
  { q: "Qual o prazo pra recolher IR sobre ganho em ações?", a: "Até o último dia útil do mês subsequente ao mês de apuração, via DARF." },
  { q: "Quem calcula e recolhe o IR sobre ganho em ações?", a: "O próprio investidor. A corretora não calcula nem recolhe (só faz a retenção do dedo-duro)." },
  { q: "Quantos cotistas, mínimo e máximo, em um clube de investimento?", a: "Mínimo 3, máximo 50." },
  { q: "Qual a concentração máxima de cotas por cotista em um clube?", a: "40% das cotas." },
  { q: "Qual o percentual mínimo do PL de um clube em renda variável?", a: "67%." },
  { q: "Quem tipicamente administra um clube de investimento?", a: "Uma corretora. Registra o clube em mercado organizado (B3) e cobra taxa de administração." },
  { q: "Quem pode gerir a carteira de um clube de investimento?", a: "Profissional autorizado pela CVM, ou um dos cotistas eleito em assembleia." },
  { q: "Cotista gestor de um clube pode receber remuneração?", a: "Não. Não pode receber remuneração ou benefício direto ou indireto pela gestão." },
  { q: "S.A. é obrigada a distribuir dividendos? O que define isso?", a: "Sim, obrigada por lei. O Estatuto Social define o percentual mínimo e a periodicidade (anual, semestral ou trimestral)." },
  { q: "Qual o limite da dedução de JCP pra empresa?", a: "Não pode exceder a TJLP (Taxa de Juros de Longo Prazo) aplicada sobre as contas do patrimônio líquido." },
  { q: "Quais os três tipos de provento que o acionista pode receber?", a: "Dividendos (lucro líquido distribuído, isento), JCP (lucros retidos, 15% na fonte) e bonificações (em ações ou em dinheiro)." },
  { q: "O que é a Clearing da B3?", a: "Câmara que faz a custódia centralizada e a liquidação das operações. Antes chamada Câmara de Ações da BM&FBOVESPA. Repassa custos via taxa de custódia." },
  { q: "Por que dividendos são isentos pro acionista pessoa física?", a: "Porque o lucro já foi tributado na empresa via IRPJ e CSLL. Tributar novamente seria bitributação econômica do mesmo lucro." },
  { q: "IR retido na fonte (dedo-duro) é deduzido do imposto devido?", a: "Sim. O valor retido na fonte (0,005% à vista, 1% day trade) é abatido do total a pagar via DARF, evitando dupla tributação." },
  { q: "Qual a diferença prática entre CTVM e DTVM hoje?", a: "Nenhuma. Desde 2009 ambas operam diretamente em bolsa, fazem distribuição, intermediação e custódia. Os dois nomes existem por razão histórica." },
  { q: "Como o spread bid-ask reflete a liquidez de uma ação?", a: "Spread baixo (compra e venda próximas) indica boa liquidez. Spread alto indica pouca liquidez e maior perda potencial em uma negociação versus o preço justo." },
  { q: "É comum corretora cobrar taxa de custódia em ações?", a: "Cada vez menos. Muitas corretoras zeram a taxa de custódia como diferencial competitivo, absorvendo o custo da Clearing da B3." },
  { q: "O que é uma oferta pública de distribuição?", a: "Operação em que valores mobiliários (ações, debêntures, cotas etc.) são ofertados ao público, regulada pela CVM. Pode ser primária ou secundária." },
  { q: "Quem é o coordenador de uma oferta pública?", a: "Instituição financeira (geralmente banco de investimento ou corretora) responsável por estruturar a oferta, divulgar, conduzir o bookbuilding e distribuir as ações." },
  { q: "Qual a relação entre Estatuto Social e dividendo obrigatório?", a: "O Estatuto define o percentual mínimo do lucro líquido que deve ser distribuído como dividendo. Se omisso, a Lei das S.A. define 50% do lucro líquido ajustado." }
];

const DIFICIL = [
  { q: "Em um IPO secundário, a empresa recebe algum recurso?", a: "Não. Em oferta secundária só são vendidas ações já existentes por acionistas atuais. Os recursos vão pros vendedores, não pra empresa." },
  { q: "Vendi R$ 25.000 em ações no mês e lucrei R$ 200. Quanto pago de IR?", a: "15% sobre R$ 200 = R$ 30. Como vendas passaram de R$ 20k, perde a isenção e o IR incide sobre TODO o lucro, não só sobre o que excedeu." },
  { q: "Tive prejuízo de R$ 5.000 em day trade e ganho de R$ 8.000 no mercado à vista. Posso compensar?", a: "Não. Prejuízo de day trade só compensa ganho de day trade. Os R$ 8.000 do à vista são tributados normalmente, e os R$ 5.000 ficam de prejuízo acumulado pra futuros day trades." },
  { q: "Quando incide o IR retido na fonte de 0,005% no mercado à vista?", a: "Quando as vendas no mês superam R$ 20.000. Incide sobre o volume vendido (não sobre o lucro). Função: ser dedo-duro pra Receita rastrear quem operou." },
  { q: "Em day trade, o IR retido na fonte de 1% incide sobre o quê?", a: "Sobre o resultado positivo apurado no fechamento da operação. Se houve prejuízo no day trade, não há retenção." },
  { q: "Bonificação tem entrada de caixa pro acionista?", a: "Em ações, não. O acionista recebe novas ações sem desembolsar nada, mas o preço unitário cai proporcionalmente. Existe bonificação em dinheiro, que é creditada em conta similar a um dividendo." },
  { q: "Existe bonificação em dinheiro?", a: "Sim. O dinheiro é creditado na conta do investidor, de maneira semelhante a um dividendo." },
  { q: "Diferença entre subscrição privada e pública?", a: "Privada: só os acionistas atuais participam, com direito de subscrição proporcional. Sobras podem ir a mercado. Pública: qualquer investidor pode subscrever (e quando é primeira emissão pública, vira IPO)." },
  { q: "O direito de subscrição pode ser vendido?", a: "Sim. O acionista que recebe direito de subscrição pode exercer (comprar as novas ações) ou vender o direito a outro investidor." },
  { q: "Após split 1:5, ação a R$ 100. Quanto fica?", a: "R$ 20. Quem tinha 1 ação passa a ter 5 ações a R$ 20. Patrimônio total inalterado: 1 × 100 = 5 × 20 = R$ 100." },
  { q: "Após grupamento 10:1, ação a R$ 0,80. Quanto fica?", a: "R$ 8,00. Quem tinha 10 ações a R$ 0,80 passa a ter 1 ação a R$ 8,00. Patrimônio total inalterado: 10 × 0,80 = 1 × 8 = R$ 8." },
  { q: "Acionista PN sempre não vota?", a: "Não. PN não vota em regra geral, mas há exceções legais previstas (ex: deixar de receber dividendos por 3 exercícios consecutivos pode dar direito a voto)." },
  { q: "Em que ano CTVM e DTVM foram equiparadas?", a: "2009. Decisão conjunta do Banco Central e da CVM, a partir daí ambas operam diretamente em bolsa." },
  { q: "Em uma falência, em que ordem PN recebe?", a: "Depois dos credores e antes dos ON. Acionistas (de qualquer tipo) só recebem se sobrar massa após pagar todos os credores. Entre os acionistas, PN tem prioridade sobre ON." },
  { q: "Qual a relação mínima entre lucros e JCP a pagar?", a: "Lucros do período (antes da dedução do JCP) ou lucros acumulados/reservas devem ser iguais ou maiores que 2x o valor do JCP a ser pago." },
  { q: "Cotista gestor pode gerir mais de um clube?", a: "Não. A norma proíbe expressamente. Se quiser gerir outro, precisa abrir mão do primeiro." },
  { q: "Cotas de clube de investimento são negociadas em mercado?", a: "Não. As cotas não podem ser negociadas em bolsa. Saída do cotista é por resgate ou transferência conforme regulamento." },
  { q: "Em IPO, por que se divulga uma faixa indicativa de preço, não um preço fixo?", a: "Porque o preço final é definido após o bookbuilding, ajustando à demanda real verificada pelos coordenadores no período de reserva." },
  { q: "Em uma ordem limitada, se o preço final do IPO ultrapassar o limite, o que acontece?", a: "A operação não é fechada e nenhuma ação é alocada pro investidor. Por isso ordem limitada protege contra preço alto, mas pode resultar em zero alocação." },
  { q: "Por que ON tem ganhado preferência sobre PN no Brasil em novos lançamentos?", a: "Padrão internacional prioriza ON. Novo Mercado da B3 só admite ON. Investidor institucional tende a preferir o direito de voto. PN ficou associada a governança mais fraca." },
  { q: "O que é penny stock e qual a consequência de ser uma?", a: "Ação negociada abaixo de R$ 1,00. Não pode fazer parte do Índice Bovespa, perdendo visibilidade e atraindo menos liquidez. Empresa costuma fazer grupamento pra escapar." },
  { q: "Cite 4 fontes típicas de risco específico de uma empresa.", a: "1. Dependência de poucos clientes. 2. Preço de matérias-primas. 3. Qualidade da gestão e política de crédito. 4. Concentração em poucos fornecedores. Outros: ações regulatórias setoriais, escândalos." },
  { q: "Spread bid-ask alto indica o quê em termos de liquidez?", a: "Liquidez baixa. Quanto maior o spread, mais o investidor perde se precisar negociar (vende mais barato, compra mais caro do que o preço justo)." },
  { q: "Quem é responsável por calcular e recolher o IR sobre ganho em ações?", a: "O próprio investidor. Calcula mensalmente, emite DARF e paga até o último dia útil do mês seguinte. Corretora só faz a retenção do dedo-duro (0,005% à vista, 1% day trade), que é deduzida do imposto devido." },
  { q: "Além de ações, o que conta nos 67% mínimos em renda variável de um clube?", a: "Bônus e recibos de subscrição, debêntures conversíveis em ações de companhias abertas, cotas de fundos de índice (ETFs), certificados de depósito em ações." },
  { q: "JCP é dedutível em qual regime tributário?", a: "Lucro real. Empresas no lucro presumido não conseguem se aproveitar da dedutibilidade do JCP." },
  { q: "Custódia em ações, todas corretoras cobram?", a: "Não. Muitas corretoras zeram a taxa de custódia hoje. Originalmente é o repasse do custo da Clearing da B3, que algumas absorvem como diferencial competitivo." },
  { q: "Qual o fato gerador do IR sobre ganho em ações?", a: "A apuração de lucro na venda. Só paga IR quem efetivamente vendeu e teve ganho, não há tributação sobre valorização não realizada." },
  { q: "Bonificação altera a participação % do acionista na empresa?", a: "Não. Todos os acionistas recebem proporcionalmente, na mesma régua. A participação % de cada um permanece a mesma, só a quantidade total de ações aumenta." },
  { q: "Day trade em ações tem a mesma alíquota de outros mercados (futuros, opções)?", a: "Sim. A alíquota de 20% sobre o lucro vale pra qualquer day trade no mercado financeiro, em ações, futuros, opções etc. A regra de compensação restrita também vale igualmente." },
  { q: "Vendi R$ 18.000 em ações no mês com lucro de R$ 5.000. Quanto IR?", a: "Zero. Vendas totais no mês ficaram dentro da isenção de R$ 20.000, então o ganho é isento, mesmo que o lucro tenha sido alto." },
  { q: "Fiz 50 day trades pequenos no mês com lucro total de R$ 800. Quanto pago de IR?", a: "20% sobre R$ 800 = R$ 160. Day trade não tem isenção, qualquer lucro é tributado a 20%." },
  { q: "Empresa pagou JCP de R$ 1 milhão. Sou PF e tenho 1% das ações. Quanto recebo líquido?", a: "Bruto: R$ 10.000 (1% de R$ 1mi). Menos 15% de IR na fonte = R$ 1.500. Líquido: R$ 8.500." },
  { q: "Em uma bonificação de 30%, ação cota a R$ 50. Qual o novo preço esperado teoricamente?", a: "≈ R$ 38,46. Cálculo: 50 / 1,30. Quem tinha 100 ações × R$ 50 = R$ 5.000 passa a ter 130 ações × R$ 38,46 ≈ R$ 5.000. Patrimônio inalterado." },
  { q: "Cotista de um clube comprou cotas e ficou com 41% do total. O que acontece?", a: "Viola a regra de concentração máxima de 40%. O administrador deve resolver (recomprar/redistribuir) pra manter o limite. A regra existe pra evitar que clube vire veículo de uma pessoa só." },
  { q: "Empresa quer abrir capital no Novo Mercado. Pode emitir ações PN?", a: "Não. Novo Mercado, segmento de governança superior da B3, só admite ações ON no capital social. Pra emitir PN tem que listar em outro segmento." },
  { q: "Tive prejuízo de R$ 2.000 em day trade em janeiro. Em fevereiro, lucrei R$ 5.000 em day trade. Quanto IR pago em fevereiro?", a: "20% sobre R$ 3.000 (R$ 5.000 ganho menos R$ 2.000 prejuízo acumulado) = R$ 600. Prejuízo de day trade do mês anterior compensa o ganho de day trade do mês seguinte." },
  { q: "Quem cobra emolumentos: corretora, B3 ou ambas?", a: "Apenas a B3. Emolumentos remuneram a bolsa pelo registro da operação. Corretagem é da corretora. Custódia pode ser da corretora/banco custodiante." },
  { q: "Investidor X comprou ação a R$ 30 e vendeu a R$ 50, com R$ 1 de custos. Lucro tributável?", a: "R$ 19 por ação (50 − 30 − 1). Custos de aquisição (corretagem, emolumentos) são dedutíveis na apuração do ganho. IR de 15% incide sobre R$ 19, ou seja R$ 2,85 por ação." },
  { q: "Em IPO, faixa indicativa R$ 16 a R$ 20. Investidor coloca ordem limitada a R$ 17. Preço final sai R$ 18. O que acontece?", a: "Investidor não recebe nenhuma ação. Como o preço final (R$ 18) ficou acima do limite (R$ 17), a corretora não fecha o negócio. Pra garantir compra teria que ter usado ordem a mercado." }
];

// ---- App state ----
let activeLevel = null;
let order = [];
let current = 0;
let stats = { sabia: 0, naoSabia: 0 };
let wrong = [];

const screen = document.getElementById('screen');
const metaPills = document.getElementById('metaPills');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderIntro() {
  metaPills.innerHTML = '';
  progressWrap.style.display = 'none';
  screen.innerHTML = `
    <div class="intro">
      <h1>Flashcards · Renda Variável</h1>
      <p>Treino de memorização. Lê a pergunta, pensa na resposta, vira o card pra conferir. Marca se sabia ou não. No fim, revisa o que errou.</p>
      <div class="level-grid">
        <button class="level-card facil" onclick="startLevel('facil')">
          <div class="lvl-name">Fácil</div>
          <div class="lvl-desc">Definições e identificação. ON, PN, dígitos da B3, conceitos básicos.</div>
          <div class="lvl-count">${FACIL.length} cards</div>
        </button>
        <button class="level-card medio" onclick="startLevel('medio')">
          <div class="lvl-name">Médio</div>
          <div class="lvl-desc">Mecânica e regras com números. Tributação, IPO, eventos societários, clube.</div>
          <div class="lvl-count">${MEDIO.length} cards</div>
        </button>
        <button class="level-card dificil" onclick="startLevel('dificil')">
          <div class="lvl-name">Difícil</div>
          <div class="lvl-desc">Pegadinhas, casos limite e cálculos. Os que mais caem em prova.</div>
          <div class="lvl-count">${DIFICIL.length} cards</div>
        </button>
        <button class="level-card misturado" onclick="startLevel('misturado')">
          <div class="lvl-name">Misturado</div>
          <div class="lvl-desc">Embaralha cards de todos os níveis. Modo prova: sem aviso de dificuldade.</div>
          <div class="lvl-count">40 cards aleatórios</div>
        </button>
      </div>
    </div>
  `;
}

function startLevel(level) {
  activeLevel = level;
  let pool;
  if (level === 'facil') pool = FACIL;
  else if (level === 'medio') pool = MEDIO;
  else if (level === 'dificil') pool = DIFICIL;
  else {
    const all = [...FACIL, ...MEDIO, ...DIFICIL];
    pool = shuffle(all).slice(0, 40);
  }
  order = shuffle(pool);
  current = 0;
  stats = { sabia: 0, naoSabia: 0 };
  wrong = [];
  progressWrap.style.display = 'block';
  updatePills();
  renderCard();
}

function updatePills() {
  const labels = { facil: 'Fácil', medio: 'Médio', dificil: 'Difícil', misturado: 'Misturado' };
  metaPills.innerHTML = `
    <span class="pill level ${activeLevel}">${labels[activeLevel]}</span>
    <span class="pill"><strong>${current + 1}</strong> / ${order.length}</span>
    <span class="pill"><strong style="color:var(--good)">${stats.sabia}</strong> sabia</span>
    <span class="pill"><strong style="color:var(--bad)">${stats.naoSabia}</strong> não sabia</span>
  `;
}

function renderCard() {
  const card = order[current];
  progressFill.style.width = `${(current / order.length) * 100}%`;
  updatePills();

  screen.innerHTML = `
    <div class="card-stage">
      <div class="flashcard" id="flash" onclick="flipCard()">
        <div class="face front">
          <div class="label">Pergunta · ${current + 1} de ${order.length}</div>
          <div class="question">${card.q}</div>
          <div class="hint">Clique no card pra ver a resposta</div>
        </div>
        <div class="face back">
          <div class="label">Resposta</div>
          <div class="answer">${card.a}</div>
          <div class="hint">Clique pra voltar</div>
        </div>
      </div>
    </div>
    <div class="rating-label" id="ratingLabel" style="display:none">Sabia essa?</div>
    <div class="self-rating" id="selfRating">
      <button class="btn bad" onclick="markCard(false)">Não sabia</button>
      <button class="btn good" onclick="markCard(true)">Sabia</button>
    </div>
    <div class="controls">
      <div class="left">
        <button class="btn ghost" onclick="renderIntro()">Voltar</button>
      </div>
      <div class="right">
        <button class="btn ghost" onclick="prevCard()" ${current === 0 ? 'disabled' : ''}>Anterior</button>
        <button class="btn" onclick="skipCard()">Pular</button>
      </div>
    </div>
  `;
}

function flipCard() {
  const f = document.getElementById('flash');
  f.classList.toggle('flipped');
  if (f.classList.contains('flipped')) {
    document.getElementById('selfRating').classList.add('show');
    document.getElementById('ratingLabel').style.display = 'block';
  }
}

function markCard(knew) {
  const card = order[current];
  if (knew) stats.sabia++;
  else { stats.naoSabia++; wrong.push(card); }
  nextCard();
}

function skipCard() { nextCard(); }

function nextCard() {
  current++;
  if (current >= order.length) {
    renderFinal();
  } else {
    renderCard();
  }
}

function prevCard() {
  if (current > 0) {
    current--;
    renderCard();
  }
}

function renderFinal() {
  progressFill.style.width = '100%';
  const total = stats.sabia + stats.naoSabia;
  const pct = total > 0 ? Math.round((stats.sabia / total) * 100) : 0;
  let comment = '';
  if (pct === 100 && total >= order.length) comment = 'Cartão limpo. Próximo nível.';
  else if (pct >= 85) comment = 'Forte. Revisa só os que escaparam.';
  else if (pct >= 70) comment = 'Decente. Roda o nível de novo focando nos errados.';
  else if (pct >= 50) comment = 'Tem buracos. Volta pro resumo antes da próxima rodada.';
  else comment = 'Lê o resumo de novo. Sério.';

  const reviewHtml = wrong.length > 0 ? `
    <div class="review">
      <h3>Cards pra revisar (${wrong.length})</h3>
      ${wrong.map(w => `
        <div class="review-item">
          <div class="q">${w.q}</div>
          <div class="a">${w.a}</div>
        </div>
      `).join('')}
    </div>
  ` : `<div class="review"><h3>Sem cards pra revisar.</h3></div>`;

  screen.innerHTML = `
    <div class="final">
      <div class="ring" style="--p:${pct}"><div class="pct">${pct}%</div></div>
      <h2>${stats.sabia} de ${order.length} acertos</h2>
      <p class="sub">${comment}</p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap: wrap;">
        ${wrong.length > 0 ? `<button class="btn" onclick="reviewWrong()">Repetir só os errados</button>` : ''}
        <button class="btn" onclick="startLevel(activeLevel)">Refazer nível</button>
        <button class="btn ghost" onclick="renderIntro()">Tela inicial</button>
      </div>
      ${reviewHtml}
    </div>
  `;
}

function reviewWrong() {
  if (wrong.length === 0) return;
  order = shuffle(wrong);
  current = 0;
  stats = { sabia: 0, naoSabia: 0 };
  wrong = [];
  updatePills();
  renderCard();
}

document.addEventListener('keydown', (e) => {
  if (!order.length || current >= order.length) return;
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    const f = document.getElementById('flash');
    if (f && !f.classList.contains('flipped')) flipCard();
  }
  if (e.key === 'ArrowRight') skipCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === '1') {
    const f = document.getElementById('flash');
    if (f && f.classList.contains('flipped')) markCard(false);
  }
  if (e.key === '2') {
    const f = document.getElementById('flash');
    if (f && f.classList.contains('flipped')) markCard(true);
  }
});

renderIntro();
</script>
</body>
</html>
