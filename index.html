<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz CPA-10 — Renda Variável & Fundos</title>
<style>
  :root {
    --bg-0: #0a0e1a;
    --bg-1: #11162a;
    --bg-2: #1a2140;
    --accent: #5fffd1;
    --accent-2: #7c5cff;
    --accent-3: #ffb547;
    --good: #3ddc84;
    --bad: #ff4d6d;
    --warn: #ffb547;
    --text: #e8ecf5;
    --muted: #8892b0;
    --line: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, var(--bg-2) 0%, var(--bg-0) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap; gap: 12px;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 600; letter-spacing: 0.3px; font-size: 13px;
    color: var(--muted); text-transform: uppercase;
    cursor: pointer;
  }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
  }
  .meta-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    background: var(--bg-1); border: 1px solid var(--line);
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .pill strong { color: var(--text); font-weight: 600; }
  .pill.level { text-transform: uppercase; letter-spacing: 0.5px; }
  .pill.level.facil { color: var(--good); border-color: rgba(61, 220, 132, 0.3); }
  .pill.level.medio { color: var(--warn); border-color: rgba(255, 181, 71, 0.3); }
  .pill.level.dificil { color: var(--bad); border-color: rgba(255, 77, 109, 0.3); }
  .pill.level.misturado { color: var(--accent-2); border-color: rgba(124, 92, 255, 0.3); }
  .pill.game { background: rgba(124, 92, 255, 0.12); color: var(--accent-2); border-color: rgba(124, 92, 255, 0.35); }
  .pill.game.fundos { background: rgba(255, 181, 71, 0.12); color: var(--accent-3); border-color: rgba(255, 181, 71, 0.35); }

  .progress {
    height: 4px; width: 100%;
    background: var(--bg-1); border-radius: 2px;
    overflow: hidden; margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 320ms cubic-bezier(.4,0,.2,1);
  }

  .card {
    background: var(--bg-1); border: 1px solid var(--line);
    border-radius: 18px; padding: 32px 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
  }

  .qmeta { font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--muted); margin-bottom: 12px; }
  .qtext { font-size: 21px; line-height: 1.45; font-weight: 500; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex; align-items: flex-start; gap: 14px;
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px 18px;
    cursor: pointer; transition: all 160ms ease;
    text-align: left; font-size: 15px; line-height: 1.5;
    color: var(--text); font-family: inherit; width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
  .opt:disabled { cursor: default; }
  .opt .letter {
    flex-shrink: 0; width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    display: grid; place-items: center;
    font-weight: 600; font-size: 13px; color: var(--muted);
  }
  .opt.correct { border-color: var(--good); background: rgba(61, 220, 132, 0.12); }
  .opt.correct .letter { background: var(--good); color: #0a0e1a; }
  .opt.wrong { border-color: var(--bad); background: rgba(255, 77, 109, 0.12); }
  .opt.wrong .letter { background: var(--bad); color: white; }

  .explain {
    margin-top: 22px; padding: 16px 18px;
    border-radius: 12px;
    background: rgba(124, 92, 255, 0.08);
    border: 1px solid rgba(124, 92, 255, 0.25);
    font-size: 14px; line-height: 1.55;
    color: var(--text); display: none;
  }
  .explain.show { display: block; }
  .explain b { color: var(--accent); }

  .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  button.btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0a0e1a; border: none; border-radius: 10px;
    padding: 12px 22px; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: inherit;
    letter-spacing: 0.3px; transition: transform 120ms ease;
  }
  button.btn:hover { transform: translateY(-1px); }
  button.btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }

  /* Intro / Game selector */
  .intro {
    text-align: center; padding: 50px 28px;
    background: var(--bg-1); border: 1px solid var(--line);
    border-radius: 18px;
  }
  .intro h1 {
    font-size: 32px; margin: 0 0 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .intro p {
    color: var(--muted); font-size: 14px; line-height: 1.6;
    max-width: 480px; margin: 0 auto 32px;
  }

  .game-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 16px; margin-top: 28px; text-align: left;
  }
  .game-card {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 16px; padding: 28px 24px;
    cursor: pointer; transition: all 180ms ease;
    color: var(--text); font-family: inherit; text-align: left;
    position: relative; overflow: hidden;
  }
  .game-card::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 50%, rgba(95, 255, 209, 0.04));
    pointer-events: none;
  }
  .game-card.fundos::before {
    background: linear-gradient(135deg, transparent 50%, rgba(255, 181, 71, 0.05));
  }
  .game-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .game-card.fundos:hover { border-color: var(--accent-3); }
  .game-card .gc-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
  .game-card.fundos .gc-tag { color: var(--accent-3); }
  .game-card .gc-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .game-card .gc-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .game-card .gc-stats { display: flex; gap: 18px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .game-card .gc-stats strong { color: var(--text); font-size: 14px; display: block; }

  .level-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 14px; margin-top: 28px; text-align: left;
  }
  .level-card {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 14px; padding: 22px 20px;
    cursor: pointer; transition: all 180ms ease;
    color: var(--text); font-family: inherit; text-align: left;
  }
  .level-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .level-card .lvl-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .level-card .lvl-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .level-card .lvl-count { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 12px; color: var(--muted); }
  .level-card.facil { border-left: 3px solid var(--good); }
  .level-card.medio { border-left: 3px solid var(--warn); }
  .level-card.dificil { border-left: 3px solid var(--bad); }
  .level-card.misturado { border-left: 3px solid var(--accent-2); }

  .back-bar {
    display: flex; justify-content: flex-start; margin-bottom: 18px;
  }

  /* Final */
  .final { text-align: center; padding: 50px 28px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 18px; }
  .final .ring {
    width: 180px; height: 180px; margin: 0 auto 24px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--p) * 1%), var(--bg-2) 0);
    display: grid; place-items: center; position: relative;
  }
  .final .ring::before { content: ""; position: absolute; inset: 12px; background: var(--bg-1); border-radius: 50%; }
  .final .ring .pct { position: relative; font-size: 38px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .final h2 { margin: 0 0 8px; font-size: 26px; }
  .final p.sub { color: var(--muted); margin-bottom: 28px; }
  .review { text-align: left; margin-top: 32px; border-top: 1px solid var(--line); padding-top: 24px; }
  .review h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
  .review-item {
    background: var(--bg-2); border-left: 3px solid var(--bad);
    padding: 14px 16px; border-radius: 8px;
    margin-bottom: 10px; font-size: 14px;
  }
  .review-item .q { font-weight: 600; margin-bottom: 6px; }
  .review-item .a { color: var(--muted); font-size: 13px; }
  .review-item .a b { color: var(--good); }

  .footer { text-align: center; color: var(--muted); font-size: 11px; margin-top: 32px; text-transform: uppercase; letter-spacing: 1px; }

  @media (max-width: 600px) {
    .qtext { font-size: 18px; }
    .card { padding: 24px 20px; }
    .level-grid, .game-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="brand" onclick="renderGameSelect()"><span class="dot"></span> Quiz CPA-10 · ANBIMA</div>
  <div class="meta-pills" id="metaPills"></div>
</header>

<div class="progress" id="progressWrap" style="display:none">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div id="screen"></div>

<div class="footer">CPA-10 ANBIMA · Cap 5 Fundos & Cap 6 Renda Variável · 240 questões</div>

</div>

<script>
// ============================================================
//  BANCO RENDA VARIÁVEL (CAP 6)
// ============================================================
const RV_FACIL = [
  { q: "O que é uma ação?", opts: ["Um título de dívida emitido pela empresa","Fração ideal do capital social de uma S.A.","Um contrato de derivativos","Cota de fundo de investimento"], correct: 1, why: "Ação representa uma fração do capital social. Quem detém é sócio, com exposição a upside e downside." },
  { q: "Qual a principal diferença entre renda fixa e renda variável?", opts: ["Renda fixa tem prazo, renda variável não","Renda fixa = promessa de pagamento (dívida); renda variável = participação no capital","Renda fixa é tributada, renda variável é isenta","Renda fixa é sempre rentável, renda variável dá prejuízo"], correct: 1, why: "Renda fixa = dívida/capital de terceiros. Renda variável = participação no capital próprio." },
  { q: "ON significa:", opts: ["Operação Negociada","Ação Ordinária Nominativa","Oferta Negocial","Obrigação Negociável"], correct: 1, why: "ON = Ordinária Nominativa. Toda ação no Brasil é nominativa." },
  { q: "PN significa:", opts: ["Participação Nominal","Ação Preferencial Nominativa","Posição Negociada","Provento Nominativo"], correct: 1, why: "PN = Preferencial Nominativa." },
  { q: "Qual o dígito final de uma ação ON na B3?", opts: ["3","4","5","6"], correct: 0, why: "ON termina em 3 (PETR3, VALE3, ABEV3). PN termina em 4." },
  { q: "Qual o dígito final de uma ação PN na B3?", opts: ["3","4","5","11"], correct: 1, why: "PN termina em 4 (PETR4, ITUB4, BBDC4)." },
  { q: "Qual o lote-padrão de negociação na B3?", opts: ["10 ações","50 ações","100 ações","1000 ações"], correct: 2, why: "Lote-padrão = 100 ações. Por isso ação cara demanda investimento mínimo alto." },
  { q: "Quem dá direito a voto em assembleia?", opts: ["PN","ON","Ambas","Nenhuma"], correct: 1, why: "ON dá voto. PN não vota, salvo exceções legais." },
  { q: "Quem tem prioridade no recebimento de dividendos?", opts: ["ON","PN","Ambas igualmente","Acionista controlador"], correct: 1, why: "PN tem prioridade em dividendos e em reembolso de capital. Em troca, abre mão do voto." },
  { q: "Capital próprio da empresa é:", opts: ["Dívidas com bancos","Patrimônio líquido (recursos dos sócios + lucros retidos)","Caixa em conta corrente","Valor de mercado das ações"], correct: 1, why: "Capital próprio = PL. Pertence aos acionistas." },
  { q: "Capital de terceiros é:", opts: ["Dinheiro investido por sócios estrangeiros","Dívidas da empresa (debêntures, empréstimos)","Lucros distribuídos","Reservas de caixa"], correct: 1, why: "Capital de terceiros = dívidas. Pertence aos credores." },
  { q: "O que é IPO?", opts: ["Investimento Público Obrigatório","Initial Public Offering: primeira venda pública de ações","Imposto sobre Operação","Índice de Performance Operacional"], correct: 1, why: "IPO = primeira oferta pública. Marca a abertura de capital da empresa." },
  { q: "O que é uma CTVM?", opts: ["Centro de Tributação de Valores Mobiliários","Sociedade Corretora de Títulos e Valores Mobiliários","Conselho Técnico de Valores Mobiliários","Câmara de Tesouraria de Valores Mobiliários"], correct: 1, why: "CTVM = corretora. Intermedia ordens entre investidor e bolsa." },
  { q: "O que é uma DTVM?", opts: ["Departamento de Tributação","Sociedade Distribuidora de Títulos e Valores Mobiliários","Diretoria Técnica","Divisão de Tesouraria"], correct: 1, why: "DTVM = distribuidora. Equiparada à corretora desde 2009." },
  { q: "O que é home broker?", opts: ["Corretor que trabalha em casa","Plataforma eletrônica que envia ordens à corretora pela internet","Tipo especial de corretora online","Aplicativo do banco para acompanhar ações"], correct: 1, why: "Home broker é a interface eletrônica do investidor, vinculada à corretora, que envia ordens em milissegundos à bolsa." },
  { q: "O que é dividendo?", opts: ["Imposto sobre lucro","Distribuição de parte do lucro líquido aos acionistas","Cobrança da corretora","Taxa de administração"], correct: 1, why: "Dividendo = parcela do lucro líquido distribuída pra acionistas em proporção às ações." },
  { q: "O que é JCP?", opts: ["Juros sobre Capital Próprio: remuneração ao acionista a partir de lucros retidos","Juros do Crédito Pessoal","Juros do Cartão Premium","Juros do Capital Promovido"], correct: 0, why: "JCP = remuneração via lucros retidos. Tem vantagem fiscal pra empresa (dedutível) e tributa o acionista a 15%." },
  { q: "Bonificação em ações é:", opts: ["Compra de ações por executivos","Distribuição gratuita de novas ações via capitalização de reservas","Imposto sobre dividendo","Direito de preferência em IPO"], correct: 1, why: "Bonificação = ações novas distribuídas gratuitamente, originadas de reservas de lucro. Sem entrada de caixa novo." },
  { q: "Subscrição de ações é:", opts: ["Compra de cotas de fundo","Oferta de novas ações pra compra (aumento de capital)","Imposto sobre IPO","Cancelamento de ações"], correct: 1, why: "Subscrição = oferta de novas ações. Aumenta capital social, traz dinheiro novo (diferente da bonificação)." },
  { q: "Desdobramento (split) é:", opts: ["Divisão de uma ação em N ações novas, com queda proporcional no preço","Junção de várias ações em uma","Distribuição extra de dividendos","Recompra de ações pela empresa"], correct: 0, why: "Split aumenta a quantidade e reduz o preço unitário, sem alterar o patrimônio do acionista." },
  { q: "Grupamento (inplit) é:", opts: ["Distribuição de ações","Agrupamento de N ações em uma só, com aumento proporcional do preço","Cisão da empresa","Fusão com outra empresa"], correct: 1, why: "Grupamento é o inverso do split. Reduz a quantidade e aumenta o preço unitário, patrimônio inalterado." },
  { q: "Ganho de capital é:", opts: ["Aumento do capital social da empresa","Diferença positiva entre preço de venda e preço de compra","Distribuição de dividendos","Juros recebidos sobre o investimento"], correct: 1, why: "Ganho de capital = preço de venda menos preço de compra (descontados custos), quando positivo." },
  { q: "Day trade é:", opts: ["Operação de compra e venda do mesmo ativo no mesmo dia","Operação que dura mais de 24h","Operação só permitida pra investidor profissional","Tipo de derivativo"], correct: 0, why: "Day trade = compra e venda no mesmo dia. Tributação especial: 20% sem isenção." },
  { q: "Risco sistemático é:", opts: ["Risco específico de uma empresa","Risco de mercado, afeta todos os ativos, não eliminável por diversificação","Risco operacional da corretora","Risco de fraude"], correct: 1, why: "Sistemático = de mercado. Causado por crises, juros, política. Não diversificável." },
  { q: "Risco não sistemático é:", opts: ["Risco de mercado","Risco específico de uma empresa, eliminável por diversificação","Risco do sistema bancário","Risco regulatório do país"], correct: 1, why: "Não sistemático = idiossincrático = específico da empresa. Some quando se diversifica." },
  { q: "Risco de liquidez é:", opts: ["Risco da empresa quebrar","Risco de não conseguir negociar o ativo a um preço justo","Risco de inflação","Risco do gestor da carteira"], correct: 1, why: "Liquidez = facilidade de negociar. Risco de liquidez é vender abaixo do justo (ou não vender) por falta de contraparte." },
  { q: "Quem cobra a corretagem?", opts: ["A B3","A corretora","O Banco Central","A CVM"], correct: 1, why: "Corretagem = receita da corretora pelo serviço de intermediação." },
  { q: "Quem cobra os emolumentos?", opts: ["A corretora","A B3","A Receita Federal","A CVM"], correct: 1, why: "Emolumentos = receita da B3 por operação registrada na bolsa." },
  { q: "A taxa de custódia remunera:", opts: ["A intermediação da ordem","O registro da operação na bolsa","A manutenção da posição em conta junto à Clearing da B3","O imposto de renda devido"], correct: 2, why: "Custódia = manter o ativo na sua conta. Cobrada por corretora ou banco, repasse do custo da Clearing." },
  { q: "Clube de investimento é:", opts: ["Fundo de pensão fechado","Comunhão de recursos de pessoas físicas (3 a 50) pra investir em valores mobiliários","Tipo de seguradora","Cooperativa de crédito"], correct: 1, why: "Clube é versão soft de fundo. Foco em renda variável (mín 67%), 3-50 cotistas, regras menos rigorosas." },
  { q: "Mercado primário é:", opts: ["Onde se negocia ações já existentes","Onde os ativos são vendidos pela primeira vez (recursos vão pro emissor)","O maior mercado da B3","Onde só profissionais operam"], correct: 1, why: "Primário = primeira venda. Recursos vão pra empresa emissora. IPO é o exemplo clássico." },
  { q: "Mercado secundário é:", opts: ["Onde se faz IPO","Onde investidores negociam ativos já existentes entre si","Mercado de balcão","Mercado de derivativos"], correct: 1, why: "Secundário = onde acontece a negociação do dia a dia, entre investidores. Empresa não recebe recursos." },
  { q: "Qual a principal bolsa de valores do Brasil?", opts: ["NYSE","Nasdaq","B3","BMF"], correct: 2, why: "B3 (Brasil, Bolsa, Balcão). Resultado da fusão da BM&FBovespa com a Cetip em 2017." },
  { q: "S.A. significa:", opts: ["Sociedade Anônima","Setor Acionário","Sociedade de Acionistas","Sigla Administrativa"], correct: 0, why: "S.A. = Sociedade Anônima. Empresa com capital dividido em ações." },
  { q: "Acionista é:", opts: ["Funcionário da empresa","Pessoa física ou jurídica que detém ações de uma empresa, sócio em proporção","Conselheiro da empresa","Cliente da empresa"], correct: 1, why: "Acionista é sócio. Tem direitos patrimoniais (dividendo) e, se ON, políticos (voto)." },
  { q: "O Estatuto Social é:", opts: ["Regulamento interno do RH","Documento que rege a S.A.: define direitos das ações, dividendo mínimo, periodicidade","Lei federal específica","Contrato com o banco"], correct: 1, why: "Estatuto Social = constituição da S.A. Define dividendo mínimo, classes de ação, governança." },
  { q: "Ibovespa é:", opts: ["Imposto sobre operações em bolsa","Principal índice acionário da B3","Bolsa de valores secundária","Câmara de compensação"], correct: 1, why: "Ibovespa = índice composto pelas ações mais negociadas e representativas do mercado brasileiro." },
  { q: "Provento é:", opts: ["Imposto pago pela empresa","Qualquer remuneração do acionista pela posse das ações (dividendo, JCP, bonificação)","Lucro retido","Receita operacional"], correct: 1, why: "Provento é o termo guarda-chuva: dividendo, JCP, bonificação. Tudo que o acionista recebe pela posse." },
  { q: "ETF é:", opts: ["Empresa de Tributação Financeira","Exchange Traded Fund: fundo de índice negociado em bolsa como ação","Estrutura de Tesouraria Financeira","Emissão de Títulos Federais"], correct: 1, why: "ETF replica um índice (ex: BOVA11 replica o Ibovespa). Negociado como ação." },
  { q: "Cotista é:", opts: ["Quem trabalha em corretora","Pessoa que detém cotas de fundo ou clube de investimento","Acionista controlador","Auditor da CVM"], correct: 1, why: "Cotista = dono de cotas. Equivalente a acionista, mas em fundo/clube em vez de S.A." }
];

const RV_MEDIO = [
  { q: "Qual segmento da B3 só admite ações ordinárias?", opts: ["Bovespa Mais","Nível 1","Nível 2","Novo Mercado"], correct: 3, why: "Novo Mercado, padrão de governança superior desde 2000. Só ON, alinhado a padrão internacional." },
  { q: "O que ocorre quando a demanda em IPO supera a oferta?", opts: ["O IPO é cancelado","Sobredemanda: gera rateio proporcional aos pedidos","O preço aumenta automaticamente","Apenas institucionais recebem"], correct: 1, why: "Sobredemanda gera rateio. Cada investidor recebe parte proporcional ao que pediu na reserva." },
  { q: "Em uma ordem LIMITADA num IPO, o investidor:", opts: ["Aceita qualquer preço final","Define o preço máximo que aceita pagar","Compra apenas se houver rateio","Cancela automaticamente após período de reserva"], correct: 1, why: "Limitada protege contra preço alto. Se preço final > limite, não compra. Ordem a mercado é o oposto." },
  { q: "Em oferta primária, quem recebe os recursos?", opts: ["Os acionistas vendedores","A empresa (aumenta capital social)","O coordenador da oferta","O fundo garantidor"], correct: 1, why: "Primária = ações novas, recursos vão pra empresa. Secundária = ações existentes, recursos vão pros vendedores." },
  { q: "Período de reserva em IPO é:", opts: ["Tempo de carência após a compra","Janela em que o investidor manifesta interesse à corretora","Reserva legal de lucros","Período em que ações ficam bloqueadas"], correct: 1, why: "Reserva = janela de manifestação de interesse. Investidor diz quanto quer comprar (ações ou R$)." },
  { q: "Como dividendos são tributados pra pessoa física no Brasil?", opts: ["15% retido na fonte","20% via DARF","Isentos de IR","Tabela progressiva"], correct: 2, why: "Dividendos isentos. Lucro já foi tributado na empresa via IRPJ/CSLL antes." },
  { q: "Como JCP é tributado pra pessoa física?", opts: ["Isento","15% retido na fonte","20% via DARF","22,5% conforme tabela"], correct: 1, why: "JCP = 15% retido na fonte. Como a empresa deduziu o JCP do IR, a Receita cobra na ponta do acionista." },
  { q: "Por que o JCP existe?", opts: ["É obrigatório por lei","É dedutível do IRPJ/CSLL pra empresa, vantagem fiscal","Substitui dividendos quando há prejuízo","Só PN recebe"], correct: 1, why: "JCP é dedutível do imposto da empresa no lucro real. Por isso a empresa prefere distribuir JCP a dividendo." },
  { q: "Bonificação altera o valor de mercado da empresa?", opts: ["Sim, aumenta","Sim, diminui","Não, só reclassifica reservas em capital social","Depende do volume distribuído"], correct: 2, why: "Bonificação = movimentação interna no PL. Acionista tem mais ações a preço menor, valor total inalterado." },
  { q: "Subscrição traz dinheiro novo pra empresa?", opts: ["Não, só reclassifica contas","Sim, é aumento de capital efetivo","Só se for privada","Só se for pública"], correct: 1, why: "Subscrição = entrada de caixa novo, aumento de capital social. Diferente da bonificação." },
  { q: "Split altera o patrimônio do acionista?", opts: ["Sim, aumenta","Sim, diminui","Não, só muda quantidade e preço unitário","Só se houver dividendo simultâneo"], correct: 2, why: "Split: mais ações a preço menor. Patrimônio total e participação % permanecem." },
  { q: "Por que uma empresa faz grupamento de ações?", opts: ["Pra aumentar capital","Pra sair da faixa de penny stock e reduzir volatilidade","Pra distribuir dividendos","Pra reduzir número de acionistas"], correct: 1, why: "Grupamento tira penny stock da exclusão do Ibovespa e reduz volatilidade da % por R$ 0,01." },
  { q: "Risco sistemático pode ser eliminado por diversificação?", opts: ["Sim, totalmente","Sim, parcialmente","Não, é o risco de estar em ações","Só com derivativos"], correct: 2, why: "Sistemático = de mercado, não diversificável. Sobra independente da carteira." },
  { q: "Risco específico pode ser eliminado por diversificação?", opts: ["Não","Sim, é justamente o que a diversificação resolve","Só em mercados desenvolvidos","Só com mais de 100 ações"], correct: 1, why: "Específico (não sistemático) some à medida que se diversifica." },
  { q: "Quais os principais indicadores de risco de liquidez em ações?", opts: ["Volatilidade e dividend yield","Volume diário negociado e spread bid-ask","P/L e ROE","Beta e alfa"], correct: 1, why: "Liquidez se mede por volume e spread. Spread alto = liquidez baixa = perda potencial em vender." },
  { q: "Alíquota de IR sobre ganho no mercado à vista de ações:", opts: ["10%","15%","20%","22,5%"], correct: 1, why: "À vista = 15% sobre o lucro." },
  { q: "Alíquota de IR sobre lucro em day trade:", opts: ["15%","17,5%","20%","22,5%"], correct: 2, why: "Day trade = 20%. Sem isenção dos R$ 20.000." },
  { q: "Isenção de R$ 20.000 vale para que valor exatamente?", opts: ["Pro lucro","Pras vendas totais no mês","Pra receita acumulada no ano","Pro patrimônio do investidor"], correct: 1, why: "É VENDAS, não lucro. Vendeu até R$ 20k no mês = isento. Não vale pra day trade." },
  { q: "Isenção de R$ 20.000 vale pra day trade?", opts: ["Sim, sempre","Não","Só se o lucro for pequeno","Só pra investidor pessoa física"], correct: 1, why: "Day trade nunca tem isenção. Sempre 20% sobre o lucro." },
  { q: "Como funciona a compensação de prejuízos em ações?", opts: ["Day trade compensa à vista e vice-versa","À vista compensa só com à vista; day trade só com day trade","Só compensa no mesmo mês","Não pode compensar"], correct: 1, why: "Não cruza. À vista com à vista, day trade com day trade. Pode ser mesmo mês ou subsequentes." },
  { q: "Prazo pra recolher IR sobre ganho em ações:", opts: ["Anual, na declaração","Último dia útil do mês subsequente ao mês de apuração","Até o dia 30 do mesmo mês","Até 90 dias após a operação"], correct: 1, why: "DARF até o último dia útil do mês seguinte. Investidor calcula sozinho." },
  { q: "Quem calcula e recolhe o IR sobre ganho em ações?", opts: ["A corretora","A B3","O próprio investidor","A Receita Federal automaticamente"], correct: 2, why: "Investidor calcula e recolhe via DARF. Corretora só faz a retenção do dedo-duro (deduzido do devido)." },
  { q: "Quantos cotistas, mínimo e máximo, em clube de investimento?", opts: ["5 a 100","3 a 50","10 a 30","2 a 150"], correct: 1, why: "Mínimo 3, máximo 50. Decorar." },
  { q: "Concentração máxima de cotas por cotista em clube:", opts: ["20%","30%","40%","50%"], correct: 2, why: "40% máximo. Evita que vire veículo de uma pessoa só." },
  { q: "Percentual mínimo do PL de clube em renda variável:", opts: ["51%","60%","67%","75%"], correct: 2, why: "67% em renda variável. Resto (até 33%) pode ir pra renda fixa." },
  { q: "Quem tipicamente administra um clube de investimento?", opts: ["A CVM","Uma corretora","O Banco Central","O cotista majoritário"], correct: 1, why: "Corretora administra: registra o clube na B3, cobra taxa de administração." },
  { q: "Quem pode gerir a carteira de um clube de investimento?", opts: ["Só profissional autorizado pela CVM","Qualquer cotista, livremente","Profissional autorizado pela CVM ou um cotista eleito em assembleia","Só o administrador"], correct: 2, why: "Pode ser profissional CVM OU cotista eleito. Mas cotista gestor não recebe remuneração e gere só 1 clube." },
  { q: "Cotista gestor de clube pode receber remuneração?", opts: ["Sim, definida em assembleia","Não, é proibido por norma","Só se aprovado por 100% dos cotistas","Só após 1 ano de gestão"], correct: 1, why: "Proibido remunerar cotista gestor, direta ou indiretamente. Diferencial vs profissional contratado." },
  { q: "Sobre dividendo na Lei das S.A.:", opts: ["Distribuição é facultativa","S.A. é obrigada; Estatuto define percentual mínimo e periodicidade","Só ON tem direito","Só pago anualmente"], correct: 1, why: "Obrigatório por lei. Estatuto define % mínimo e periodicidade (anual, semestral, trimestral)." },
  { q: "Limite da dedução de JCP pra empresa:", opts: ["Sem limite","TJLP aplicada sobre o PL","SELIC sobre o lucro","CDI sobre o capital social"], correct: 1, why: "Limite = TJLP sobre as contas do PL. Acima disso, não é dedutível." },
  { q: "Qual destes NÃO é provento?", opts: ["Dividendo","JCP","Bonificação","Corretagem"], correct: 3, why: "Corretagem é despesa cobrada pela corretora. Provento é o que o acionista RECEBE pela posse das ações." },
  { q: "A Clearing da B3 é:", opts: ["Câmara de fiscalização da CVM","Câmara de custódia centralizada e liquidação das operações","Departamento jurídico da B3","Conselho de administração da B3"], correct: 1, why: "Clearing custodia ativos e liquida operações. Antes era a Câmara de Ações da BM&FBovespa." },
  { q: "Por que dividendos são isentos pra PF no Brasil?", opts: ["Pra estimular bolsa","Porque o lucro já foi tributado na empresa via IRPJ/CSLL","Porque o STF assim decidiu","Porque a CVM determina"], correct: 1, why: "Isenção evita bitributação econômica. Lucro já pagou imposto na empresa antes de virar dividendo." },
  { q: "IR retido na fonte (dedo-duro) é deduzido do imposto devido?", opts: ["Não, é cumulativo","Sim, abate do total a pagar via DARF","Só em day trade","Só pra grandes investidores"], correct: 1, why: "Retido na fonte (0,005% à vista, 1% day trade) é abatido. Função: dedo-duro pra Receita rastrear quem operou." },
  { q: "Qual a diferença prática entre CTVM e DTVM hoje?", opts: ["CTVM opera em bolsa, DTVM só em balcão","DTVM só vende títulos públicos","Nenhuma diferença prática desde 2009","CTVM cobra menos"], correct: 2, why: "Equiparadas em 2009 (decisão Bacen + CVM). Ambas operam diretamente em bolsa." },
  { q: "Spread bid-ask alto indica:", opts: ["Liquidez alta","Liquidez baixa, maior perda potencial em negociar","Volatilidade baixa","Boa governança"], correct: 1, why: "Spread alto = liquidez baixa. Quanto maior a diferença compra/venda, mais o investidor perde." },
  { q: "Custódia de ações: as corretoras sempre cobram?", opts: ["Sim, é obrigatório","Não, muitas zeram como diferencial competitivo","Só pra clientes pequenos","Só em ações estrangeiras"], correct: 1, why: "Originalmente era repasse do custo da Clearing. Hoje muitas corretoras absorvem e zeram a custódia." },
  { q: "Oferta pública de distribuição é regulada por:", opts: ["BACEN","CVM","Receita Federal","Tesouro Nacional"], correct: 1, why: "CVM regula ofertas públicas de valores mobiliários. Bacen regula instituições financeiras." },
  { q: "O coordenador de uma oferta pública é:", opts: ["A CVM","Um banco de investimento ou corretora que estrutura e distribui a oferta","O Tesouro Nacional","O acionista controlador"], correct: 1, why: "Coordenador estrutura, faz bookbuilding, distribui. Geralmente banco de investimento ou corretora grande." },
  { q: "Se o Estatuto for omisso sobre o dividendo obrigatório, a Lei das S.A. define:", opts: ["10% do lucro","25% do lucro","50% do lucro líquido ajustado","75% do lucro"], correct: 2, why: "Lei das S.A.: na omissão do Estatuto, dividendo obrigatório = 50% do lucro líquido ajustado." }
];

const RV_DIFICIL = [
  { q: "Em IPO secundário, a empresa recebe algum recurso?", opts: ["Sim, integral","Sim, parcialmente","Não, recursos vão pros acionistas vendedores","Só após o período de reserva"], correct: 2, why: "Secundária = ações já existentes vendidas por acionistas atuais. Empresa não vê os recursos." },
  { q: "Vendi R$ 25.000 em ações no mês e lucrei R$ 200. Quanto pago de IR?", opts: ["Zero (isenção)","R$ 30 (15% sobre R$ 200)","R$ 750 (15% sobre R$ 5.000 que excedeu)","R$ 40 (20% sobre R$ 200)"], correct: 1, why: "Vendas > R$ 20k = perde isenção. IR de 15% sobre TODO o lucro (R$ 200), não só o excedente." },
  { q: "Tive prejuízo de R$ 5.000 em day trade e ganho de R$ 8.000 no à vista. Posso compensar?", opts: ["Sim, integralmente","Não, day trade só compensa com day trade","Sim, mas só 50%","Sim, mas no mesmo mês apenas"], correct: 1, why: "Não cruza. Os R$ 8k do à vista pagam 15% normais. Os R$ 5k de prejuízo ficam acumulados pra futuros day trades." },
  { q: "Quando incide o IR retido na fonte de 0,005% no à vista?", opts: ["Sempre, em qualquer venda","Quando vendas no mês > R$ 20.000, sobre o volume vendido","Sobre o lucro acima de R$ 20.000","Só em day trade"], correct: 1, why: "0,005% sobre VOLUME vendido (não lucro), quando vendas mensais > R$ 20k. Função: dedo-duro." },
  { q: "Em day trade, o IR retido na fonte de 1% incide sobre:", opts: ["O volume negociado","O resultado positivo apurado no fechamento","O patrimônio do investidor","Sobre cada operação isoladamente"], correct: 1, why: "1% sobre o resultado POSITIVO apurado. Se day trade deu prejuízo, não há retenção." },
  { q: "Bonificação em ações tem entrada de caixa pro acionista?", opts: ["Sim, sempre","Não, recebe ações novas; o preço unitário cai proporcionalmente","Sim, mas só pra PN","Sim, equivale a dividendo"], correct: 1, why: "Em ações = sem caixa. Existe bonificação em DINHEIRO (similar a dividendo), mas a clássica é em ações." },
  { q: "Existe bonificação em dinheiro?", opts: ["Não, só em ações","Sim, creditada em conta similar a dividendo","Sim, mas só pra PN","Sim, mas é proibida pela CVM"], correct: 1, why: "Sim. Dinheiro creditado na conta do investidor de modo semelhante a um dividendo." },
  { q: "Diferença entre subscrição privada e pública?", opts: ["Privada é só PJ, pública é só PF","Privada: só acionistas atuais; pública: qualquer investidor (e quando primeira pública = IPO)","Privada paga mais imposto","Privada não tem direito de preferência"], correct: 1, why: "Privada = direito de preferência dos atuais. Sobras vão a mercado. Pública = qualquer um, e a primeira pública vira IPO." },
  { q: "O direito de subscrição pode ser vendido?", opts: ["Não, é intransferível","Sim, acionista pode exercer ou vender o direito","Só se aprovado em assembleia","Só pra outro acionista da empresa"], correct: 1, why: "Direito de subscrição é negociável. Acionista que não quer exercer pode vender pra outro investidor." },
  { q: "Após split 1:5, ação a R$ 100. Quanto fica?", opts: ["R$ 5","R$ 20","R$ 25","R$ 100 (não muda)"], correct: 1, why: "100 / 5 = R$ 20. Quem tinha 1 ação a R$ 100 passa a ter 5 a R$ 20. Patrimônio inalterado." },
  { q: "Após grupamento 10:1, ação a R$ 0,80. Quanto fica?", opts: ["R$ 0,08","R$ 1,00","R$ 8,00","R$ 80,00"], correct: 2, why: "0,80 × 10 = R$ 8. Quem tinha 10 ações a R$ 0,80 passa a ter 1 a R$ 8. Patrimônio inalterado." },
  { q: "Acionista PN sempre não tem direito a voto?", opts: ["Sim, sempre","Não, há exceções legais (ex: 3 anos sem dividendo)","Só em assembleia ordinária","Só com aprovação de 2/3"], correct: 1, why: "PN normalmente não vota, mas há exceções. Ex: deixar de receber dividendo por 3 exercícios consecutivos pode dar voto." },
  { q: "CTVM e DTVM foram equiparadas em qual ano?", opts: ["1998","2002","2009","2017"], correct: 2, why: "2009. Decisão conjunta Bacen + CVM, ambas passaram a operar diretamente em bolsa." },
  { q: "Em uma falência, quando o acionista PN recebe?", opts: ["Antes dos credores","Depois dos credores e antes dos ON","Junto com ON","Só após pagamento dos impostos federais"], correct: 1, why: "Acionista (qualquer tipo) só recebe se sobrar massa após credores. Entre acionistas, PN tem prioridade sobre ON." },
  { q: "Qual a relação mínima entre lucros e JCP a pagar?", opts: ["Igual ou maior que o JCP","Igual ou maior que 2x o JCP","Igual ou maior que 50% do JCP","Sem relação obrigatória"], correct: 1, why: "Lucros do período (antes da dedução) ou acumulados ≥ 2× JCP a pagar. Senão, não pode distribuir JCP." },
  { q: "Cotista gestor pode gerir mais de um clube?", opts: ["Sim, sem limite","Sim, até 3","Não, apenas um","Sim, se for da mesma família"], correct: 2, why: "Norma proíbe expressamente. Se quiser gerir outro, precisa abrir mão do primeiro." },
  { q: "Cotas de clube de investimento são negociadas em mercado?", opts: ["Sim, em bolsa","Sim, em mercado de balcão","Não, saída só por resgate ou transferência","Só após 1 ano"], correct: 2, why: "Cotas de clube não são negociadas em bolsa nem balcão. Saída por resgate ou transferência conforme regulamento." },
  { q: "Em IPO, por que se divulga faixa indicativa de preço, não preço fixo?", opts: ["Pra dar margem ao coordenador lucrar","Pra ajustar via bookbuilding conforme demanda real","Por exigência da CVM","Pra evitar concorrência entre corretoras"], correct: 1, why: "Faixa indicativa permite calibrar preço final via bookbuilding, baseado no interesse manifestado no período de reserva." },
  { q: "Em ordem limitada, se preço final do IPO ultrapassar o limite, o que acontece?", opts: ["Compra parcial","Compra ao preço limite","Negócio não é fechado, zero alocação","Cobra multa do investidor"], correct: 2, why: "Ordem limitada não fecha se preço > limite. Por isso protege contra preço alto, mas pode resultar em zero alocação." },
  { q: "Por que ON tem ganhado preferência sobre PN no Brasil?", opts: ["Tributação mais baixa","Padrão internacional, Novo Mercado só ON, governança melhor percebida","Lei mudou em 2010","CVM proibiu novas PN"], correct: 1, why: "Padrão global prioriza ON. Novo Mercado só admite ON. Institucional prefere voto. PN ficou associada a governança fraca." },
  { q: "Penny stock é definido como ação:", opts: ["De empresa pequena","Negociada abaixo de R$ 1, excluída do Ibovespa","Que paga pouco dividendo","Sem liquidez"], correct: 1, why: "Penny stock = ação < R$ 1. Pela regra da B3, excluída do Ibovespa. Empresa faz grupamento pra escapar." },
  { q: "Qual NÃO é fonte típica de risco específico de uma empresa?", opts: ["Dependência de poucos clientes","Preço de matérias-primas","Crise macroeconômica global","Qualidade da gestão"], correct: 2, why: "Crise macro = risco SISTEMÁTICO (de mercado). Os outros são específicos da empresa." },
  { q: "Quem é responsável por calcular e recolher o IR sobre ganho em ações?", opts: ["A corretora, automaticamente","A B3","O próprio investidor, via DARF","A Receita Federal"], correct: 2, why: "Investidor calcula sozinho mensalmente, emite DARF e paga até último dia útil do mês seguinte." },
  { q: "Além de ações, o que conta nos 67% mínimos em RV de um clube?", opts: ["Só ações","Bônus de subscrição, debêntures conversíveis em ações, ETFs, certificados de depósito em ações","Títulos públicos","Renda fixa bancária"], correct: 1, why: "Os 67% incluem ações + instrumentos com exposição ao risco de ações: bônus subscrição, debêntures conversíveis, ETFs, BDRs." },
  { q: "JCP é dedutível em qual regime tributário?", opts: ["Lucro real","Lucro presumido","Simples Nacional","Em qualquer regime"], correct: 0, why: "Só lucro real permite dedução de JCP. No presumido, não há benefício fiscal de distribuir JCP." },
  { q: "Qual o fato gerador do IR sobre ganho em ações?", opts: ["A compra da ação","A apuração de lucro na venda","O recebimento de dividendos","A passagem de ano fiscal"], correct: 1, why: "Fato gerador = lucro apurado na venda. Não há tributação sobre valorização não realizada (mark-to-market)." },
  { q: "Bonificação altera a participação % do acionista?", opts: ["Sim, aumenta","Sim, diminui","Não, todos recebem proporcionalmente","Depende do tipo de ação"], correct: 2, why: "Todos recebem na mesma proporção. % de cada um inalterado, só aumenta a quantidade total de ações." },
  { q: "Day trade em ações tem mesma alíquota de outros mercados (futuros, opções)?", opts: ["Não, ações é menor","Sim, 20% sobre o lucro vale igual em todos","Não, ações é maior","Depende do volume"], correct: 1, why: "20% pra qualquer day trade. Regras de compensação restrita também valem igualmente entre os mercados." },
  { q: "Vendi R$ 18.000 em ações no mês com lucro de R$ 5.000. Quanto IR?", opts: ["Zero (vendas dentro da isenção)","R$ 750 (15% sobre R$ 5.000)","R$ 1.000 (20%)","R$ 300 (15% sobre lucro acima de R$ 4.000)"], correct: 0, why: "Vendas mensais ≤ R$ 20.000 = isento, mesmo com lucro alto. Isenção é sobre vendas, não sobre lucro." },
  { q: "Fiz 50 day trades pequenos no mês, lucro total R$ 800. IR?", opts: ["Zero (lucro abaixo da isenção)","R$ 120 (15%)","R$ 160 (20%)","R$ 80 (10%)"], correct: 2, why: "Day trade = 20% sobre lucro, sem isenção. R$ 800 × 20% = R$ 160." },
  { q: "Empresa pagou JCP de R$ 1mi, sou PF e tenho 1% das ações. Líquido?", opts: ["R$ 10.000","R$ 8.500","R$ 9.500","R$ 7.750"], correct: 1, why: "Bruto: 1% × 1mi = R$ 10.000. Menos 15% IR = R$ 1.500. Líquido: R$ 8.500." },
  { q: "Bonificação 30%, ação a R$ 50. Novo preço esperado teoricamente?", opts: ["R$ 50 (não muda)","R$ 35,00","R$ 38,46","R$ 65,00"], correct: 2, why: "50 / 1,30 ≈ R$ 38,46. Quem tinha 100 ações × R$ 50 = R$ 5.000 passa a ter 130 × R$ 38,46 ≈ R$ 5.000." },
  { q: "Cotista de clube ficou com 41% das cotas. O que acontece?", opts: ["Tudo bem, é só monitorar","Viola limite de 40%; admin precisa ajustar","Vira controlador","Recebe rendimento extra"], correct: 1, why: "Concentração máxima é 40%. Administrador deve resolver (recompra/redistribuição) pra manter o limite." },
  { q: "Empresa quer abrir capital no Novo Mercado. Pode emitir PN?", opts: ["Sim, sem restrições","Sim, mas mínimo 50% ON","Não, Novo Mercado só admite ON","Sim, só nos primeiros 3 anos"], correct: 2, why: "Novo Mercado é segmento de governança superior. Só admite ON. Pra emitir PN, lista em outro segmento." },
  { q: "Day trade prejuízo R$ 2k em janeiro, lucro R$ 5k em fevereiro (day trade). IR de fevereiro?", opts: ["R$ 1.000 (20% sobre R$ 5k)","R$ 600 (20% sobre R$ 3k, líquido)","Zero (compensa)","R$ 750 (15%)"], correct: 1, why: "Compensa: R$ 5k − R$ 2k = R$ 3k tributáveis. 20% × R$ 3.000 = R$ 600. Day trade compensa day trade entre meses." },
  { q: "Investidor X comprou ação a R$ 30 e vendeu a R$ 50, custos R$ 1. Lucro tributável por ação?", opts: ["R$ 20","R$ 19","R$ 50","R$ 30"], correct: 1, why: "Lucro = 50 − 30 − 1 = R$ 19 por ação. Custos (corretagem, emolumentos) são dedutíveis. IR de 15% incide sobre R$ 19." },
  { q: "IPO faixa R$ 16-20. Investidor coloca ordem limitada R$ 17. Preço final sai R$ 18. Resultado?", opts: ["Compra a R$ 17","Compra a R$ 18","Não recebe nenhuma ação","Compra com rateio"], correct: 2, why: "Preço final (R$ 18) > limite (R$ 17), corretora não fecha. Zero alocação. Pra garantir compra, ordem a mercado." },
  { q: "Corretagem, custódia, emolumentos: qual é cobrada pela B3?", opts: ["Corretagem","Custódia","Emolumentos","Todas pela B3"], correct: 2, why: "Emolumentos = receita da B3. Corretagem é da corretora. Custódia pode ser da corretora/banco custodiante." },
  { q: "Qual destes investimentos NÃO conta nos 67% mínimos em RV de clube?", opts: ["Ações","ETFs","Debêntures conversíveis em ações","Títulos públicos federais"], correct: 3, why: "Títulos públicos federais entram nos 33% restantes (renda fixa). Os 67% são ações e instrumentos com exposição a risco de ações." },
  { q: "S.A. com Estatuto omisso sobre dividendo obrigatório. A lei garante mínimo de:", opts: ["10% do lucro","25% do lucro","50% do lucro líquido ajustado","100% do lucro"], correct: 2, why: "Na omissão do Estatuto, Lei das S.A. define dividendo mínimo de 50% do lucro líquido ajustado." }

  { q: "Fundo de investimento é juridicamente:", opts: ["Pessoa jurídica","Condomínio de natureza especial (comunhão de recursos)","Cooperativa","Sociedade limitada"], correct: 1, why: "Fundo é condomínio especial (Lei da Liberdade Econômica). Comunhão de recursos pra aplicação coletiva." },
  { q: "Cota de fundo representa:", opts: ["Direito de voto","Fração ideal do patrimônio líquido do fundo","Dívida do fundo com o cotista","Pagamento periódico fixo"], correct: 1, why: "Cota = fração ideal do PL. Escritural, nominativa." },
  { q: "Cotista de fundo é:", opts: ["Sócio do gestor","Pessoa que detém cotas, em proporção ao valor aportado","Funcionário do administrador","Cliente da CVM"], correct: 1, why: "Cotista é dono de cotas, condômino. Direitos proporcionais ao número de cotas." },
  { q: "Diferença entre FI e FIC:", opts: ["FI é aberto, FIC é fechado","FI investe direto em ativos; FIC investe em cotas de outros fundos","FI tem FGC, FIC não","Não há diferença"], correct: 1, why: "FI investe direto em ações, títulos, derivativos. FIC investe pelo menos 95% em cotas de outros fundos." },
  { q: "Fundo aberto x fundo fechado:", opts: ["Aberto não tem cotização; fechado tem","Aberto: entrada e saída a qualquer momento; fechado: só em períodos definidos","Não há diferença prática","Aberto é maior que fechado"], correct: 1, why: "Aberto permite aplicação e resgate quando o cotista quiser. Fechado só em janelas, ou vencimento." },
  { q: "Patrimônio segregado do fundo significa:", opts: ["O PL é dividido em duas contas","Os ativos do fundo não se misturam com os do administrador/gestor","O fundo é segregado por estado","Cada cotista tem seu patrimônio individual"], correct: 1, why: "Patrimônio do fundo é separado dos prestadores. Se administrador/gestor quebra, ativos do fundo não vão pra massa falida." },
  { q: "Quais são os prestadores de serviço ESSENCIAIS de um fundo?", opts: ["CVM e Bacen","Administrador Fiduciário e Gestor de Recursos","Custodiante e auditor","Cotista controlador e distribuidor"], correct: 1, why: "Os dois essenciais: Administrador (fiduciário) e Gestor (de carteira). Outros são contratados em nome do fundo." },
  { q: "Administrador Fiduciário é responsável por:", opts: ["Comprar e vender ativos","Administração, funcionamento, divulgação, controladoria, apreçamento","Pagar dividendos","Negociar com a Receita Federal"], correct: 1, why: "Administrador cuida da operação do fundo: registro, contabilidade, divulgação, controle, apreçamento. Não decide compras/vendas." },
  { q: "Gestor de Recursos é responsável por:", opts: ["Recolhimento de IR","Decisões de compra e venda de ativos (decisões de investimento)","Distribuição de cotas no varejo","Cobrança da taxa de administração"], correct: 1, why: "Gestor decide a composição da carteira: o que comprar, vender, quando. PJ autorizada CVM + certificada ANBIMA." },
  { q: "Taxa de administração remunera:", opts: ["O Bacen","A operacionalização do fundo (administrador + serviços contratados)","O IR","O cotista pelo aporte"], correct: 1, why: "Taxa de adm = % a.a. sobre PL, descontada DIARIAMENTE da cota. Cobre administração + serviços contratados." },
  { q: "Taxa de performance remunera:", opts: ["A custódia","O gestor por superar o benchmark, cobrada só sobre o excedente","O distribuidor","O auditor independente"], correct: 1, why: "Performance = sobre o EXCEDENTE ao benchmark. Mínima semestral, líquida de despesas." },
  { q: "Taxa de ingresso é cobrada:", opts: ["Diariamente","Na aplicação, sobre o valor aplicado (raro no Brasil)","No resgate","Mensalmente"], correct: 1, why: "Ingresso = entrada. Cobrada na aplicação, sobre o valor aportado. Pouco usada no Brasil." },
  { q: "Taxa de saída é cobrada:", opts: ["Em todo resgate","No resgate antecipado, sobre o valor resgatado (raro)","Diariamente","Na constituição do fundo"], correct: 1, why: "Saída = cobrança em resgate antecipado, sobre o valor resgatado. Pouco usada no Brasil." },
  { q: "Marcação a mercado (apreçamento) é:", opts: ["Atualização semestral do valor dos ativos","Atualização diária do valor dos ativos pelo preço de mercado","Estimativa do gestor","Avaliação contábil pelo custo de aquisição"], correct: 1, why: "MtM = atualização diária ao preço de mercado. Garante preço justo na entrada e saída, evita transferência de riqueza entre cotistas." },
  { q: "Gestão ATIVA tem por objetivo:", opts: ["Replicar o benchmark","Superar o benchmark ou retorno absoluto","Manter caixa parado","Reduzir taxas"], correct: 1, why: "Ativa busca bater o benchmark via seleção. Passiva apenas replica." },
  { q: "Gestão PASSIVA tem por objetivo:", opts: ["Bater o benchmark com folga","Replicar o benchmark (ex: Fundo Ibovespa Indexado)","Bater a Selic","Lucrar com volatilidade"], correct: 1, why: "Passiva = replicar o índice de referência. Custo menor, sem aposta de gestão." },
  { q: "Quais são as principais classes CVM de fundos?", opts: ["Conservador, Moderado, Agressivo","Renda Fixa, Ações, Multimercado, Cambial","Curto, Médio, Longo Prazo","Pequenas, Médias, Grandes"], correct: 1, why: "Classes CVM: Renda Fixa, Ações, Multimercado, Cambial (mais Incentivado em Infra e Garantia de Locação Imobiliária)." },
  { q: "Come-cotas é:", opts: ["Comissão da gestora","IR antecipado, retido pelo administrador em maio e novembro","Taxa especial de resgate","Cobrança de quem resgata antes de 30 dias"], correct: 1, why: "Come-cotas = antecipação semestral do IR (maio e nov), pela menor alíquota da categoria. Não incide em fundos de Ações." },
  { q: "IOF em fundos incide:", opts: ["Sobre o valor aplicado","Sobre o rendimento, em resgates antes de 30 dias","Sobre a taxa de administração","Sobre o patrimônio do fundo"], correct: 1, why: "IOF sobre rendimento, tabela regressiva: 96% no dia 1 → 0% no dia 30. Após 30 dias, sem IOF." },
  { q: "O Regulamento do fundo é:", opts: ["Resumo de marketing","Documento completo que rege o fundo (política, taxas, prestadores, regras)","Cartilha pro cotista","Material publicitário"], correct: 1, why: "Regulamento = constituição do fundo. Só muda em AG ou por determinação CVM." },
  { q: "A Lâmina de Informações Essenciais serve pra:", opts: ["Substituir o regulamento","Resumo padronizado que permite comparar fundos","Pagar dividendos","Calcular IR"], correct: 1, why: "Lâmina = resumo padronizado pra comparar fundos. Pode ser dispensada em alguns casos." },
  { q: "O Termo de Adesão e Ciência de Risco:", opts: ["É opcional","Cotista assina antes da primeira aplicação, com até 5.000 caracteres e os 5 principais riscos","Substitui a lâmina","É enviado anualmente"], correct: 1, why: "Termo assinado antes de aplicar. Atesta acesso a documentos, ciência de riscos, ausência de garantia, possível aporte adicional." },
  { q: "Fundo de Ações deve ter no mínimo qual % em ações?", opts: ["51%","60%","67%","80%"], correct: 2, why: "Fundo de Ações: mín 67% em ações, BDR II/III, FIA/ETF, certificados/bônus." },
  { q: "Fundo Cambial deve ter no mínimo qual % em moeda estrangeira?", opts: ["50%","67%","80%","95%"], correct: 2, why: "Fundo Cambial: 80% em ativos relacionados a moeda estrangeira." },
  { q: "Fundo de Renda Fixa deve ter no mínimo qual % em ativos atrelados a juros/índice de preços?", opts: ["51%","67%","80%","95%"], correct: 2, why: "Renda Fixa: 80% em ativos atrelados a juros e/ou índice de preços." },
  { q: "Risco de crédito é:", opts: ["Risco de o preço cair","Risco de a contraparte não cumprir a obrigação","Risco de não conseguir vender","Risco de gestão ruim"], correct: 1, why: "Crédito = inadimplência (parcial, total, atraso). Cotista de fundo NÃO corre risco da gestora, só dos ativos da carteira." },
  { q: "Risco de liquidez é:", opts: ["Risco da inflação corroer o ganho","Risco de não conseguir vender ao preço justo (volume baixo, spread alto)","Risco de o gestor errar a estratégia","Risco de IR aumentar"], correct: 1, why: "Liquidez = dificuldade de negociar a preço justo. Medido por volume e spread." },
  { q: "Risco de mercado é:", opts: ["Risco da bolsa falir","Variação de preço por fatores macro, políticos ou específicos","Risco de IR mudar","Risco de fraude"], correct: 1, why: "Mercado = variação de preços por fatores diversos. Não eliminável por diversificação (risco sistemático)." },
  { q: "Diversificação serve pra:", opts: ["Aumentar o retorno","Reduzir risco específico, aproveitando correlação imperfeita entre ativos","Eliminar todo o risco","Reduzir o IR"], correct: 1, why: "Risco de carteira < soma dos riscos individuais. Risco específico some, sistemático permanece." },
  { q: "Assembleia Geral de cotistas (AG):", opts: ["Convocada pelo cotista que quiser","Reunião deliberativa dos cotistas, com competências privativas (taxa, regulamento, prestador, fusão)","Define cotação diária","Define remuneração do auditor"], correct: 1, why: "AG decide: contas, mudança de regulamento, aumento de taxas, fusão/cisão, substituição de prestador essencial, insolvência, plano pra PL negativo." },
  { q: "Quem regula fundos de investimento no Brasil?", opts: ["Bacen","CVM (Resolução CVM 175/22)","Receita Federal","Tesouro Nacional"], correct: 1, why: "CVM regula fundos via Resolução 175/22 e anexos normativos. Bacen regula instituições financeiras." },
  { q: "Fundo de investimento tem cobertura do FGC?", opts: ["Sim, até R$ 250 mil","Sim, até R$ 1 milhão","Não tem cobertura do FGC","Só fundos de renda fixa"], correct: 2, why: "Fundo NÃO tem FGC. Em vez disso, tem patrimônio segregado dos prestadores. CDB tem FGC (R$ 250k/CPF)." },
  { q: "Fundo de investimento tem CNPJ próprio?", opts: ["Não, usa CNPJ do administrador","Sim, fundo e classes têm CNPJ próprio","Só fundos fechados","Só fundos de varejo"], correct: 1, why: "Fundo tem CNPJ e escrituração contábil próprias. Patrimônio segregado dos prestadores." },
  { q: "Cotas de fundo são:", opts: ["Físicas, ao portador","Escriturais, nominativas, frações ideais do PL","Cartulares, transferíveis ao portador","Eletrônicas e anônimas"], correct: 1, why: "Cotas = escriturais (registro eletrônico), nominativas (identificam titular), frações ideais do PL." },
  { q: "Mudança no regulamento do fundo requer:", opts: ["Decisão do gestor","Aprovação em assembleia geral (ou determinação da CVM)","Aviso aos cotistas com 30 dias","Concordância do auditor"], correct: 1, why: "Regulamento muda em AG ou por determinação CVM. Algumas mudanças tem efeito imediato com direito de retirada." },
  { q: "Taxa de administração é cobrada:", opts: ["Anualmente, em janeiro","% a.a. sobre o PL, descontada DIARIAMENTE da cota","No resgate","Só sobre o lucro"], correct: 1, why: "Adm = pro rata diário sobre o PL. Por isso a cota divulgada já é líquida de adm. Fixa, não depende de performance." },
  { q: "Antes da primeira aplicação, o administrador entrega ao cotista:", opts: ["Apenas o termo de adesão","Regulamento e lâmina","Demonstração de desempenho","Carta-convite"], correct: 1, why: "Cotista recebe regulamento + lâmina antes da primeira aplicação, e assina termo de adesão e ciência de risco." },
  { q: "Princípio da equidade entre cotistas:", opts: ["Todos têm mesmos direitos, independente da quantidade de cotas","Cotistas grandes têm mais voto","Cotistas antigos pagam menos taxa","Equidade só se aplica ao gestor"], correct: 0, why: "Equidade: todos cotistas com mesmos direitos. Diferenciação só por subclasse (público-alvo, prazos, taxas)." },
  { q: "Extrato do fundo é enviado ao cotista:", opts: ["Diariamente","Mensalmente","Semestralmente","Apenas no resgate"], correct: 1, why: "Extrato mensal obrigatório. Demonstrações contábeis e desempenho são anuais/semestrais." },
  { q: "Cotista pode receber comunicações do fundo por meio eletrônico?", opts: ["Não, só físico","Sim, é o padrão; físico só por solicitação","Só se tiver mais de R$ 1mi aplicado","Não há comunicação obrigatória"], correct: 1, why: "Padrão = eletrônico. Físico só por solicitação do cotista, com custo conforme regulamento." }
];

  { q: "Fechamento do fundo para resgates por mais de quantos dias consecutivos exige AGE?", opts: ["2 dias","5 dias","10 dias","30 dias"], correct: 1, why: "Fechamento > 5 dias consecutivos: AGE obrigatória. Antes, fato relevante imediato." },

  { q: "IOF: alíquota máxima (dia 1):", opts: ["50%","75%","90%","96%"], correct: 3, why: "Dia 1 = 96%. Vai descendo até 0% no dia 30. Penalização forte pra desestimular resgates muito rápidos." },

  { q: "Em fundo com sufixo \"Responsabilidade Limitada\", se o PL ficar negativo:", opts: ["Cotistas aportam recursos adicionais","Insolvência judicial; cotista perde no máximo o aporte","Administrador cobre com PL próprio","CVM assume o fundo"], correct: 1, why: "Resp Limitada = cotista limitado ao valor subscrito. PL negativo = insolvência judicial. Sem o sufixo, cotista aporta a diferença." },
  { q: "Cotista pode vender cotas de fundo ABERTO livremente a terceiros?", opts: ["Sim, em bolsa","Não, transferência só em situações taxativas (judicial, sucessão, conjugal etc.)","Sim, via termo de cessão","Só com autorização da CVM"], correct: 1, why: "Fundo aberto: cotas intransferíveis fora dos casos taxativos. Pra sair, resgate. Fundo fechado é diferente (cessão ou mercado)." },
  { q: "Quem é VEDADO de votar em Assembleia Geral?", opts: ["Cotistas com menos de 5%","Prestadores de serviço, sócios, partes relacionadas, cotistas com conflito de interesse","Cotistas estrangeiros","Cotistas pessoa jurídica"], correct: 1, why: "Vedados: prestadores essenciais ou não, sócios/diretores/funcionários, partes relacionadas, cotistas em conflito de interesse." },
  { q: "Diferença entre Assembleia Geral (AG) e Assembleia Especial (AE):", opts: ["AG é virtual, AE presencial","AG: todos os cotistas do fundo; AE: só os de uma classe ou subclasse específica","AG é convocada pelo gestor, AE pelo administrador","Não há diferença"], correct: 1, why: "AG = todos. AE = só cotistas de uma classe/subclasse específica, pra deliberar matérias daquela classe." },
  { q: "Sobre garantia FGC: CDB tem, fundo de investimento tem?", opts: ["Ambos têm","Só CDB tem (R$ 250k/CPF). Fundo NÃO tem FGC","Só fundo tem","Nenhum tem"], correct: 1, why: "CDB tem FGC. Fundo NÃO tem. Em vez disso, fundo tem patrimônio segregado dos prestadores." },
  { q: "Rentabilidade divulgada do fundo é:", opts: ["Líquida de tudo (taxas + IR)","Bruta de tudo","Líquida de taxas (adm, gestão, performance), mas BRUTA de IR","Líquida só de IR"], correct: 2, why: "Pegadinha. Divulgada já considera taxas (cota é descontada), mas é bruta de IR. Cotista paga IR sobre essa rentabilidade." },
  { q: "Pode-se cobrar taxa de performance em fundo de Renda Fixa Curto Prazo?", opts: ["Sim, sem restrições","Não, é vedado (exceto qualificados ou RF com compromisso de longo prazo)","Sim, se aprovado em AG","Só após 1 ano"], correct: 1, why: "Vedada em RF Curto Prazo, Referenciado e RF simples. Exceções: qualificados, RF de longo prazo, RF Dívida Externa." },
  { q: "FIC Multimercado tem alguma flexibilidade especial em sua aplicação?", opts: ["Não, igual aos demais FICs","Pode investir em fundos de tipos diferentes (não só do mesmo tipo)","Pode ter menos de 95% em cotas","Pode cobrar taxa de saída"], correct: 1, why: "FIC normal só investe em fundos do mesmo tipo. FIC Multimercado pode misturar tipos diferentes." },
  { q: "Marcação a mercado (apreçamento) tem como função principal:", opts: ["Reduzir o IR do fundo","Evitar transferência de riqueza entre cotistas que aplicam e resgatam","Aumentar a rentabilidade","Atender à Receita Federal"], correct: 1, why: "MtM garante preço justo na entrada/saída. Sem MtM, quem aplica ou resgata se beneficia ou perde injustamente vs os demais cotistas." },
  { q: "Fundo ALAVANCADO pode gerar perda superior ao patrimônio aplicado?", opts: ["Não, perda máxima é o aporte","Sim, alavancagem com derivativos pode levar a perdas > patrimônio","Só se for fundo de ações","Só com autorização da CVM"], correct: 1, why: "Fundo alavancado usa derivativos pra ampliar exposição. Pode gerar perda > PL, e cotista (sem resp limitada) cobre a diferença." },
  { q: "Cotista de fundo corre risco de crédito da gestora?", opts: ["Sim, integralmente","Não, só dos ativos da carteira","Sim, parcialmente","Depende do tipo de fundo"], correct: 1, why: "Cotista NÃO corre risco da gestora, só dos ativos da carteira. Patrimônio segregado protege contra falência dos prestadores." },
  { q: "Fundo ABERTO pode ser negociado em bolsa?", opts: ["Sim, livremente","Sim, em mercado de balcão","Não. Apenas fundos FECHADOS (como FII) podem ter cotas negociadas em mercado","Só após 1 ano"], correct: 2, why: "Fundo aberto: cotas só por resgate ou transferência taxativa, nunca em mercado. Fundo fechado (ex: FII) pode ser negociado em B3." },
  { q: "Em fundo FECHADO, como o cotista sai antes do vencimento?", opts: ["Resgate direto","Por cessão via termo ou negociação em mercado organizado","Só com decisão judicial","Só na assembleia anual"], correct: 1, why: "Fechado não permite resgate direto. Saída: termo de cessão ou venda em mercado (ex: FII na B3)." },
  { q: "Alíquota do come-cotas é a MAIOR ou MENOR da categoria?", opts: ["A maior","A menor","A média","Varia caso a caso"], correct: 1, why: "Come-cotas usa a MENOR alíquota da categoria (20% curto, 15% longo). Diferença pra alíquota real é ajustada no resgate." },
  { q: "Compensação entre fundos de administradores diferentes:", opts: ["Não é possível","É possível se houver intermediação pela mesma PJ","Só com autorização da CVM","Sempre permitido, sem restrição"], correct: 1, why: "Possível desde que tenha mesma intermediação. Caso comum: investidor opera em uma plataforma, mas os fundos são de admins diferentes." },
  { q: "Qual destes ativos tem limite SEM teto de concentração no PL do fundo?", opts: ["Companhias abertas (10%)","Crédito privado (5%)","Títulos públicos federais (sem limite)","Cotas de FIDC (20%)"], correct: 2, why: "TPF, ouro B3, IF, ações em oferta pública, BDR, derivativos: sem limite. União: 100%. Demais têm tetos." },
  { q: "Limite de concentração no PL pra ativos de partes ligadas (administrador/gestor/empresas ligadas):", opts: ["5%","10%","20%","Sem limite"], correct: 2, why: "Partes ligadas: 20% do PL. Mesmo limite de IF, pra evitar concentração em empresas do grupo." },
  { q: "Penalidade por atraso em resgate (0,5%/dia): vai pra quem?", opts: ["Administrador","Gestor","Cotista lesado","Fundo Garantidor"], correct: 2, why: "Penalidade é PRO COTISTA, paga pelo administrador (ou gestor, conforme o caso). Salvo iliquidez excepcional documentada." },
  { q: "Auditoria independente em fundo é:", opts: ["Opcional","Obrigatória, contratada pelo administrador em nome do fundo","Só obrigatória em fundos > R$ 100mi","Feita pela CVM"], correct: 1, why: "Auditoria independente é obrigatória, contratada pelo administrador em nome do fundo. Parecer acompanha demonstrações contábeis anuais." },
  { q: "Prestadores de serviço essenciais respondem por obrigações do fundo?", opts: ["Sim, solidariamente","Não, só por prejuízos causados com dolo ou má-fé","Sim, integralmente","Só os contratados em nome do fundo"], correct: 1, why: "Prestadores não respondem por obrigações do fundo. Só por prejuízos com dolo ou má-fé. Obrigação de meio, não de resultado. Sem solidariedade." },
  { q: "Renda Fixa Curto Prazo: o IR pode descer abaixo de 20%?", opts: ["Sim, vai a 15% após 720 dias","Não, mínimo 20% (mesmo após muito tempo)","Sim, a 17,5% após 360 dias","Vai a 0% após 5 anos"], correct: 1, why: "Curto Prazo: 22,5% até 180d, 20% acima. NUNCA desce a 17,5% ou 15%. Apenas Longo Prazo desce até 15%." },
  { q: "Fundo aberto pode ter vencimento (prazo de duração)?", opts: ["Sim, sempre","Não, vencimento é exclusividade de fundo fechado","Só se aprovado em AG","Só fundos > 5 anos"], correct: 1, why: "Fundo aberto: sem vencimento, dura indefinidamente. Fechado: pode ter prazo definido em regulamento." },
  { q: "Aplica R$ 10.000 em Fundo Curto Prazo, resgata em 200 dias com lucro de R$ 1.000. Qual IR?", opts: ["R$ 150 (15%)","R$ 175 (17,5%)","R$ 200 (20%)","R$ 225 (22,5%)"], correct: 2, why: "Curto Prazo, 200 dias = 20% (acima de 180). 1.000 × 20% = R$ 200. Em curto prazo, IR nunca desce de 20%." },
  { q: "Aplica em Fundo Longo Prazo, resgata após 730 dias com lucro de R$ 1.000. Qual IR?", opts: ["R$ 150 (15%)","R$ 175 (17,5%)","R$ 200 (20%)","R$ 225 (22,5%)"], correct: 0, why: "Longo Prazo > 720 dias = 15%. 1.000 × 15% = R$ 150. Mínima da tabela regressiva longa." },
  { q: "Aplica em Fundo de Ações, resgata após 100 dias com lucro de R$ 1.000. Qual IR?", opts: ["R$ 150 (15%)","R$ 200 (20%)","R$ 225 (22,5%)","Zero (isento)"], correct: 0, why: "Fundo de Ações: 15% fixo, independente do prazo. 1.000 × 15% = R$ 150." },
  { q: "Aplica em Fundo Longo Prazo, resgata em 100 dias (rápido) com lucro de R$ 1.000. Qual IR?", opts: ["R$ 150 (15%)","R$ 200 (20%)","R$ 225 (22,5%)","Depende"], correct: 2, why: "Longo Prazo: tabela regressiva. Até 180 dias = 22,5%. 1.000 × 22,5% = R$ 225. Resgate cedo, paga alíquota maior." },
  { q: "Diferença entre RF Simples e RF Referenciado:", opts: ["Simples cobra performance, Referenciado não","Simples: 95% em soberano + dispensa termo e suitability + só aberto + compara com Selic. Referenciado: 95% em ativos do índice de referência, nome inclui o índice","Referenciado é mais conservador","Não há diferença"], correct: 1, why: "Simples: estratégia de proteção, soberano, dispensa termo. Referenciado: replica um índice (DI, IPCA), nome inclui o índice." },
  { q: "Quem usa cota D+0 e quem usa D+1?", opts: ["Todos usam D+0","D+0 só em baixa volatilidade (RF, Exclusivo, Previdenciário); demais D+1","D+1 só em fundos de Ações","Depende do administrador"], correct: 1, why: "Regra CVM: D+0 só fundos de baixa volatilidade. D+1 nos demais, pra evitar arbitragem com a valorização do dia." },
  { q: "Quem é responsável pelo apreçamento (marcação a mercado) dos ativos do fundo?", opts: ["Gestor","Administrador Fiduciário","CVM","Auditor independente"], correct: 1, why: "Apreçamento é responsabilidade do Administrador Fiduciário, junto com controladoria de ativos. Gestor decide compras/vendas." },
  { q: "Cota de fundo é calculada como:", opts: ["Valor de mercado dividido pelo PL inicial","(Valor dos ativos − Despesas) / Número de cotas","Patrimônio aplicado pelo cotista / quantidade comprada","Sempre R$ 1,00"], correct: 1, why: "Valor da cota = (PL − despesas) / nº cotas, apurado no encerramento do dia." },
  { q: "Se o valor da cota cai, o administrador ainda cobra taxa de administração?", opts: ["Não, só se houver ganho","Sim, taxa é fixa sobre o PL, cobrada diariamente, independente da performance","Sim, mas devolve no final do ano","Não, é proibido"], correct: 1, why: "Taxa de adm = % sobre PL, fixa, descontada DIARIAMENTE da cota. Cobra mesmo com cota caindo." },
  { q: "Compensação de prejuízo de Fundo de Ações:", opts: ["Pode compensar com fundo RF","Só pode compensar com outro Fundo de Ações","Compensa com qualquer fundo, livre","Não pode compensar"], correct: 1, why: "Ações só compensa com Ações. Não pode cruzar com RF/Cambial/MM. Ações não tem come-cotas, IR só no resgate." },
  { q: "Princípio da equidade entre cotistas: depende da quantidade de cotas?", opts: ["Sim, maior cota tem mais direitos","Não, todos os cotistas têm os mesmos direitos","Só se previsto em regulamento","Quem tem > 10% tem direitos especiais"], correct: 1, why: "Equidade: todos com mesmos direitos, independente da quantidade de cotas. Diferenciação só por subclasse (público-alvo, prazo, taxa)." },
  { q: "Diferença entre Material Publicitário e Material Técnico:", opts: ["São sinônimos","Publicitário: estratégia comercial; Técnico: suporte à decisão de investimento, com classificação ANBIMA, objetivo, riscos, taxas","Técnico é só interno","Publicitário não pode mencionar rentabilidade"], correct: 1, why: "Publicitário pode mencionar rentabilidade, mas deve apontar pro Técnico. Técnico tem todas as info pra decisão informada." },
  { q: "Termo de Adesão deve listar quantos fatores de risco?", opts: ["Todos os fatores","Os 5 principais riscos","Os 3 principais","Os 10 mais relevantes"], correct: 1, why: "Termo de adesão: máx 5.000 caracteres, lista os 5 PRINCIPAIS fatores de risco do fundo." },
  { q: "Forma padrão de comunicação do fundo com o cotista é:", opts: ["Correio físico","Meio eletrônico (físico só por solicitação, com custo)","Telegrama","Notícia em jornal"], correct: 1, why: "Padrão = eletrônico. Físico só se cotista solicitar, com custo conforme regulamento. Vale pra extratos, fatos relevantes, voto." },
  { q: "Fundo que se autodenomina \"Crédito Privado\" precisa de termo de ciência específico?", opts: ["Não, basta o regulamento","Sim, termo específico assinado por cada investidor, além do alerta no regulamento","Só pra investidores institucionais","Só se PL > R$ 100mi"], correct: 1, why: "Crédito Privado (>50% em privados/não-União) = nome do fundo + alerta no regulamento + termo específico. Risco de crédito mais alto." },
  { q: "Substituição de prestador essencial (administrador ou gestor): formas válidas?", opts: ["Só por decisão da CVM","Descredenciamento CVM, renúncia, ou destituição em Assembleia Geral","Só por morte do prestador","Apenas com 100% dos cotistas"], correct: 1, why: "Três formas: descredenciamento CVM, renúncia do prestador, ou destituição em AG (competência privativa)." },
  { q: "Pode ser cobrada taxa de performance em Fundo de Ações?", opts: ["Sim, livremente conforme regulamento","Não, é vedado","Só pra investidores qualificados","Só após 1 ano"], correct: 0, why: "Performance é permitida em Ações, Multimercado etc. Vedada (com exceções) em RF Curto Prazo, Referenciado e RF simples." },
  { q: "Por que existe a barreira de informação (Chinese Wall) entre tesouraria do banco e a asset?", opts: ["Pra reduzir custos","Pra evitar conflito de interesse, fraudes e insider trading","Por exigência fiscal","Por organização administrativa"], correct: 1, why: "Chinese Wall = segregação física e administrativa. Evita que a asset use info da tesouraria do banco em benefício próprio ou em prejuízo dos cotistas." }
];

// ============================================================
//  MOTOR DO QUIZ
// ============================================================
const GAMES = {
  rv: {
    name: "Renda Variável",
    tag: "Cap 6 · Ações",
    desc: "Quiz sobre ações, IPO, dividendos, JCP, riscos, tributação e clube de investimento.",
    facil: RV_FACIL, medio: RV_MEDIO, dificil: RV_DIFICIL,
    color: "rv"
  },
  fundos: {
    name: "Fundos de Investimento",
    tag: "Cap 5 · Fundos",
    desc: "Quiz sobre fundos: FI/FIC, abertos/fechados, taxas, classes CVM, tributação, come-cotas, clube.",
    facil: FU_FACIL, medio: FU_MEDIO, dificil: FU_DIFICIL,
    color: "fundos"
  }
};

let activeGame = null;
let activeLevel = null;
let order = [];
let current = 0;
let score = 0;
let wrong = [];

const screen = document.getElementById('screen');
const metaPills = document.getElementById('metaPills');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderGameSelect() {
  activeGame = null;
  activeLevel = null;
  metaPills.innerHTML = '';
  progressWrap.style.display = 'none';
  screen.innerHTML = `
    <div class="intro">
      <h1>Escolha o jogo</h1>
      <p>Dois quizzes independentes pra treinar pra prova ou pro gameshow da aula. Cada um tem 120 questões em 4 níveis.</p>
      <div class="game-grid">
        <button class="game-card" onclick="selectGame('rv')">
          <div class="gc-tag">${GAMES.rv.tag}</div>
          <div class="gc-name">${GAMES.rv.name}</div>
          <div class="gc-desc">${GAMES.rv.desc}</div>
          <div class="gc-stats">
            <div><strong>120</strong> questões</div>
            <div><strong>4</strong> níveis</div>
          </div>
        </button>
        <button class="game-card fundos" onclick="selectGame('fundos')">
          <div class="gc-tag">${GAMES.fundos.tag}</div>
          <div class="gc-name">${GAMES.fundos.name}</div>
          <div class="gc-desc">${GAMES.fundos.desc}</div>
          <div class="gc-stats">
            <div><strong>120</strong> questões</div>
            <div><strong>4</strong> níveis</div>
          </div>
        </button>
      </div>
    </div>
  `;
}

function selectGame(gameKey) {
  activeGame = gameKey;
  renderLevelSelect();
}

function renderLevelSelect() {
  activeLevel = null;
  metaPills.innerHTML = `<span class="pill game ${activeGame === 'fundos' ? 'fundos' : ''}">${GAMES[activeGame].name}</span>`;
  progressWrap.style.display = 'none';
  const g = GAMES[activeGame];
  screen.innerHTML = `
    <div class="back-bar">
      <button class="btn ghost" onclick="renderGameSelect()">← Trocar jogo</button>
    </div>
    <div class="intro">
      <h1>${g.name}</h1>
      <p>${g.desc}</p>
      <div class="level-grid">
        <button class="level-card facil" onclick="startLevel('facil')">
          <div class="lvl-name">Fácil</div>
          <div class="lvl-desc">Definições e identificação.</div>
          <div class="lvl-count">${g.facil.length} questões</div>
        </button>
        <button class="level-card medio" onclick="startLevel('medio')">
          <div class="lvl-name">Médio</div>
          <div class="lvl-desc">Mecânica e regras com números.</div>
          <div class="lvl-count">${g.medio.length} questões</div>
        </button>
        <button class="level-card dificil" onclick="startLevel('dificil')">
          <div class="lvl-name">Difícil</div>
          <div class="lvl-desc">Pegadinhas, casos limite e cálculos.</div>
          <div class="lvl-count">${g.dificil.length} questões</div>
        </button>
        <button class="level-card misturado" onclick="startLevel('misturado')">
          <div class="lvl-name">Misturado</div>
          <div class="lvl-desc">40 aleatórios entre os 120.</div>
          <div class="lvl-count">40 aleatórias</div>
        </button>
      </div>
    </div>
  `;
}

function startLevel(level) {
  activeLevel = level;
  const g = GAMES[activeGame];
  let pool;
  if (level === 'facil') pool = g.facil;
  else if (level === 'medio') pool = g.medio;
  else if (level === 'dificil') pool = g.dificil;
  else pool = shuffle([...g.facil, ...g.medio, ...g.dificil]).slice(0, 40);
  order = shuffle(pool);
  current = 0;
  score = 0;
  wrong = [];
  progressWrap.style.display = 'block';
  updatePills();
  renderQuestion();
}

function updatePills() {
  const labels = { facil: 'Fácil', medio: 'Médio', dificil: 'Difícil', misturado: 'Misturado' };
  metaPills.innerHTML = `
    <span class="pill game ${activeGame === 'fundos' ? 'fundos' : ''}">${GAMES[activeGame].name}</span>
    <span class="pill level ${activeLevel}">${labels[activeLevel]}</span>
    <span class="pill"><strong>${score}</strong> / ${order.length}</span>
  `;
}

function renderQuestion() {
  const q = order[current];
  const optMap = q.opts.map((text, idx) => ({ text, isCorrect: idx === q.correct }));
  const shuffled = shuffle(optMap);
  const correctAfterShuffle = shuffled.findIndex(o => o.isCorrect);

  progressFill.style.width = `${(current / order.length) * 100}%`;
  updatePills();

  const letters = ['A','B','C','D'];
  screen.innerHTML = `
    <div class="card">
      <div class="qmeta">Questão ${current + 1} de ${order.length}</div>
      <div class="qtext">${q.q}</div>
      <div class="options" id="opts">
        ${shuffled.map((o, i) => `
          <button class="opt" data-i="${i}">
            <span class="letter">${letters[i]}</span>
            <span>${o.text}</span>
          </button>
        `).join('')}
      </div>
      <div class="explain" id="explain"></div>
      <div class="actions" id="actions"></div>
    </div>
  `;

  document.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.i), correctAfterShuffle, shuffled, q));
  });
}

function handleAnswer(picked, correctIdx, shuffled, q) {
  document.querySelectorAll('.opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    if (i === picked && picked !== correctIdx) btn.classList.add('wrong');
  });

  const isRight = picked === correctIdx;
  if (isRight) score++;
  else wrong.push({ q: q.q, picked: shuffled[picked].text, correct: q.opts[q.correct], why: q.why });

  updatePills();

  const explain = document.getElementById('explain');
  explain.innerHTML = `<b>${isRight ? 'Certo.' : 'Errado.'}</b> ${q.why}`;
  explain.classList.add('show');

  const actions = document.getElementById('actions');
  const isLast = current === order.length - 1;
  actions.innerHTML = `<button class="btn" onclick="nextQuestion()">${isLast ? 'Ver resultado' : 'Próxima'}</button>`;
}

function nextQuestion() {
  current++;
  if (current >= order.length) renderFinal();
  else renderQuestion();
}

function renderFinal() {
  progressFill.style.width = '100%';
  const pct = Math.round((score / order.length) * 100);
  let comment = '';
  if (pct === 100) comment = 'Perfeito. Vai dominar o gameshow.';
  else if (pct >= 85) comment = 'Forte. Revisa só os pontos específicos.';
  else if (pct >= 70) comment = 'OK, mas tem espaço pra melhorar antes do quiz.';
  else if (pct >= 50) comment = 'Volta pro resumo antes da próxima rodada.';
  else comment = 'Volta pro resumo. Sério.';

  const reviewHtml = wrong.length > 0 ? `
    <div class="review">
      <h3>Revisar erros (${wrong.length})</h3>
      ${wrong.map(w => `
        <div class="review-item">
          <div class="q">${w.q}</div>
          <div class="a">Você: "${w.picked}"</div>
          <div class="a"><b>Correto:</b> "${w.correct}"</div>
          <div class="a" style="margin-top:6px">${w.why}</div>
        </div>
      `).join('')}
    </div>
  ` : `<div class="review"><h3>Sem erros pra revisar.</h3></div>`;

  screen.innerHTML = `
    <div class="final">
      <div class="ring" style="--p:${pct}"><div class="pct">${pct}%</div></div>
      <h2>${score} de ${order.length} acertos</h2>
      <p class="sub">${comment}</p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn" onclick="startLevel(activeLevel)">Refazer nível</button>
        <button class="btn ghost" onclick="renderLevelSelect()">Outro nível</button>
        <button class="btn ghost" onclick="renderGameSelect()">Trocar jogo</button>
      </div>
      ${reviewHtml}
    </div>
  `;
}

renderGameSelect();
</script>
</body>
</html>
